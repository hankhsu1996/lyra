id: dump.mir_binary_shift
tags: [dump]
input:
  command: [dump, mir]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "BinaryExpr op=ShiftLeft"
      - "BinaryExpr op=LogicalShiftRight"
      - "BinaryExpr op=ArithmeticShiftRight"
    not_contains:
      - "LogicalShiftLeft"
      - "ArithmeticShiftLeft"
