id: dump.mir_loop_body_nested_generate
tags: [dump]
input:
  command: [dump, mir]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - 'StructuralScope "gen0_loop"'
      - "StructuralParams:"
      - '[0] "i"'
      - "IfStmt"
      - 'StructuralParamRef[hops=0, param=0] "i"'
      - "BinaryExpr op=Equality"
    not_contains:
      - "LoopVarRef"
      - "InternalError"
