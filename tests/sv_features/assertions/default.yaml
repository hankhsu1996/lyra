feature: assertions
description: Tests for immediate assertion statements (A1a) and assertion-related options

cases:
  # A1a positive tests: plain immediate assert

  - name: assert_true
    description: Passing assertion does not produce error, execution continues
    sv: |
      module Test;
        int x;
        initial begin
          x = 1;
          assert (1);
          x = 2;
          $finish;
        end
      endmodule
    expect:
      variables:
        x: 2

  - name: assert_false
    description: Failing assertion with no else emits default error, execution continues
    sv: |
      module Test;
        int x;
        initial begin
          x = 1;
          assert (0);
          x = 2;
          $finish;
        end
      endmodule
    expect:
      variables:
        x: 2
      stdout:
        contains:
          - "error"

  - name: assert_pass_and_fail_true
    description: Assertion with both pass and fail actions, condition true
    sv: |
      module Test;
        int x;
        initial begin
          x = 0;
          assert (1) x = 10; else x = 20;
          $finish;
        end
      endmodule
    expect:
      variables:
        x: 10

  - name: assert_pass_and_fail_false
    description: Assertion with both pass and fail actions, condition false
    sv: |
      module Test;
        int x;
        initial begin
          x = 0;
          assert (0) x = 10; else x = 20;
          $finish;
        end
      endmodule
    expect:
      variables:
        x: 20

  - name: assert_pass_only_true
    description: Assertion with only pass action, condition true
    sv: |
      module Test;
        int x;
        initial begin
          x = 0;
          assert (1) x = 10;
          $finish;
        end
      endmodule
    expect:
      variables:
        x: 10

  - name: assert_pass_only_false
    description: Assertion with only pass action, condition false emits default error
    sv: |
      module Test;
        int x;
        initial begin
          x = 0;
          assert (0) x = 10;
          x = 5;
          $finish;
        end
      endmodule
    expect:
      variables:
        x: 5
      stdout:
        contains:
          - "error"

  - name: assert_fail_only_true
    description: Assertion with only else action, condition true falls through
    sv: |
      module Test;
        int x;
        initial begin
          x = 0;
          assert (1) else x = 20;
          x = 5;
          $finish;
        end
      endmodule
    expect:
      variables:
        x: 5

  - name: assert_fail_only_false
    description: Assertion with only else action, condition false executes fail
    sv: |
      module Test;
        int x;
        initial begin
          x = 0;
          assert (0) else x = 20;
          $finish;
        end
      endmodule
    expect:
      variables:
        x: 20

  - name: assert_nested_in_if
    description: Assertion inside an if body
    sv: |
      module Test;
        int x;
        initial begin
          x = 0;
          if (1) begin
            assert (1) x = 10; else x = 20;
          end
          $finish;
        end
      endmodule
    expect:
      variables:
        x: 10

  - name: assert_expression_condition
    description: Assertion with a non-trivial expression condition
    sv: |
      module Test;
        int a, b;
        initial begin
          a = 5;
          b = 0;
          assert (a > 3) b = 1; else b = 2;
          $finish;
        end
      endmodule
    expect:
      variables:
        b: 1

  # Migration boundary tests

  - name: concurrent_assertion_error
    description: Concurrent assertion without flag produces compile error
    sv: |
      module Test;
        bit clk = 0;
        int x = 5;
        initial forever #10 clk = ~clk;
        always_ff @(posedge clk) begin
          assert property (x > 0);
        end
        initial begin
          #100;
          $finish;
        end
      endmodule
    expect:
      error:
        contains: ["concurrent assertion statements are unsupported"]

  # Still-unsupported form tests

  - name: deferred_assertion_error
    description: Deferred immediate assertion is unsupported
    sv: |
      module Test;
        int x = 5;
        initial begin
          assert #0 (x > 0);
          $finish;
        end
      endmodule
    expect:
      error:
        contains: ["deferred immediate assertions are unsupported"]

  - name: assume_assertion_error
    description: Immediate assume is unsupported in A1a
    sv: |
      module Test;
        int x = 5;
        initial begin
          assume (x > 0);
          $finish;
        end
      endmodule
    expect:
      error:
        contains: ["immediate 'Assume' is unsupported"]

  # disable_assertions tests

  - name: immediate_assertion_skipped
    description: Immediate assertion skipped with --disable-assertions
    disable_assertions: true
    sv: |
      module Test;
        int x = 0;
        initial begin
          x = 42;
          assert (x > 0);
          $finish;
        end
      endmodule
    expect:
      variables:
        x: 42

  - name: concurrent_assertion_skipped
    description: Concurrent assertion in procedural block skipped
    disable_assertions: true
    sv: |
      module Test;
        bit clk = 0;
        int count = 0;
        initial forever #10 clk = ~clk;
        always_ff @(posedge clk) begin
          count <= count + 1;
          assert property (count >= 0);
        end
        initial begin
          repeat(3) @(posedge clk);
          #1;
          $finish;
        end
      endmodule
    expect:
      variables:
        count: 3

  - name: module_scope_assertion_skipped
    description: Module-scope assertion (isFromAssertion process) skipped
    disable_assertions: true
    sv: |
      module Test;
        bit clk = 0;
        int count = 0;
        initial forever #10 clk = ~clk;
        always_ff @(posedge clk)
          count <= count + 1;
        assert property (@(posedge clk) count >= 0);
        initial begin
          repeat(3) @(posedge clk);
          #1;
          $finish;
        end
      endmodule
    expect:
      variables:
        count: 3

  - name: mixed_assertions_skipped
    description: Both immediate and module-scope assertions skipped together
    disable_assertions: true
    sv: |
      module Test;
        bit clk = 0;
        logic rst_n = 0;
        int count = 0;
        initial forever #10 clk = ~clk;
        initial begin
          rst_n = 0;
          repeat(2) @(posedge clk);
          @(posedge clk);
          rst_n = 1;
        end
        always_ff @(posedge clk or negedge rst_n) begin
          if (!rst_n)
            count <= 0;
          else begin
            count <= count + 1;
            assert (count >= 0);
          end
        end
        assert property (@(posedge clk) disable iff (!rst_n) count >= 0);
        initial begin
          repeat(6) @(posedge clk);
          #1;
          $finish;
        end
      endmodule
    expect:
      variables:
        count: 3
