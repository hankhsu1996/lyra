feature: strobe
description: Tests for $strobe system task (IEEE 1800-2017 section 21.2.2)

cases:
  - name: strobe_string
    sv: |
      module Test;
        initial $strobe("Hello Strobe");
      endmodule
    expect:
      stdout: "Hello Strobe\n"

  - name: strobe_empty
    sv: |
      module Test;
        initial $strobe();
      endmodule
    expect:
      stdout: "\n"

  - name: strobe_integer
    sv: |
      module Test;
        int x;
        initial begin
          x = 42;
          $strobe("%d", x);
        end
      endmodule
    expect:
      stdout: "42\n"

  - name: strobe_multiple_values
    sv: |
      module Test;
        int a, b;
        initial begin
          a = 10;
          b = 20;
          $strobe("a=%d b=%d", a, b);
        end
      endmodule
    expect:
      stdout: "a=10 b=20\n"

  - name: strobeb_binary
    sv: |
      module Test;
        logic [7:0] x;
        initial begin
          x = 8'b10101010;
          $strobeb(x);
        end
      endmodule
    expect:
      stdout: "10101010\n"

  - name: strobeo_octal
    sv: |
      module Test;
        logic [8:0] x;
        initial begin
          x = 9'o755;
          $strobeo(x);
        end
      endmodule
    expect:
      stdout: "755\n"

  - name: strobeh_hex
    sv: |
      module Test;
        logic [15:0] x;
        initial begin
          x = 16'hBEEF;
          $strobeh(x);
        end
      endmodule
    expect:
      stdout: "beef\n"

  # Strobe prints after display within the same time step
  - name: strobe_after_display_ordering
    sv: |
      module Test;
        initial begin
          $display("display first");
          $strobe("strobe second");
          $display("display third");
        end
      endmodule
    expect:
      stdout: "display first\ndisplay third\nstrobe second\n"

  # Multiple strobes execute in order in Postponed region
  - name: multiple_strobes_ordering
    sv: |
      module Test;
        initial begin
          $strobe("strobe 1");
          $strobe("strobe 2");
          $strobe("strobe 3");
        end
      endmodule
    expect:
      stdout: "strobe 1\nstrobe 2\nstrobe 3\n"

  # Strobe with format specifiers
  - name: strobe_format_specifiers
    sv: |
      module Test;
        int x;
        initial begin
          x = 255;
          $strobe("dec=%0d hex=%0h bin=%0b oct=%0o", x, x, x, x);
        end
      endmodule
    expect:
      stdout: "dec=255 hex=ff bin=11111111 oct=377\n"

  - name: strobe_design_global
    description: strobe at top-level alongside child instances
    sv: |
      module Child;
        initial $strobe("child alive");
      endmodule

      module Top;
        Child u_child();
        int val;
        initial begin
          val = 99;
          $strobe("top val=%0d", val);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "top val=99"
          - "child alive"

  - name: strobe_module_scoped
    description: strobe inside a child module reads instance-local state
    sv: |
      module Child;
        int value;
        initial begin
          value = 42;
          $strobe("child value=%0d", value);
        end
      endmodule

      module Top;
        Child u_child();
        initial begin
          $strobe("top done");
        end
      endmodule
    expect:
      stdout:
        contains:
          - "child value=42"
          - "top done"

  - name: strobe_multiple_instances
    description: strobe in multiple instances of the same module
    sv: |
      module Counter;
        parameter int ID = 0;
        int count;
        initial begin
          count = ID * 10;
          $strobe("counter %0d: count=%0d", ID, count);
        end
      endmodule

      module Top;
        Counter #(.ID(1)) u_a();
        Counter #(.ID(2)) u_b();
        Counter #(.ID(3)) u_c();
      endmodule
    expect:
      stdout:
        contains:
          - "counter 1: count=10"
          - "counter 2: count=20"
          - "counter 3: count=30"
