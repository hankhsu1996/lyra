id: dump.mir_binary_logical
tags: [dump]
input:
  command: [dump, mir]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "BinaryExpr op=LogicalAnd"
      - "BinaryExpr op=LogicalOr"
      - "BinaryExpr op=LogicalImplication"
      - "BinaryExpr op=LogicalEquivalence"
