feature: specialization_grouping
description: Tests deterministic specialization grouping by ModuleSpecId

cases:
  - name: no_params
    description: Two instances of same module with no params -> grouped together (plus Top)
    dump_specialization_map: true
    sv: |
      module Counter;
        initial $display("counter");
      endmodule

      module Top;
        Counter c0();
        Counter c1();
      endmodule
    expect:
      compiler_output:
        contains:
          - "spec_groups: 2"
          - "spec[0]: def=0"
          - "spec[1]: def=1"
          - "instances=1"
          - "instances=2"

  - name: same_structural_params
    description: Two instances with same structural param value -> one group (plus Top)
    dump_specialization_map: true
    sv: |
      module Sized #(parameter int WIDTH = 8);
        bit [WIDTH-1:0] data;
        initial begin
          data = '1;
          $display("w=%0d d=%0d", WIDTH, data);
        end
      endmodule

      module Top;
        Sized #(.WIDTH(4)) s0();
        Sized #(.WIDTH(4)) s1();
      endmodule
    expect:
      compiler_output:
        contains:
          - "spec_groups: 2"
          - "spec[0]: def=0"
          - "spec[1]: def=1"
          - "instances=2"

  - name: value_only_params_dont_split
    description: Value-only params with same structural shape -> one group (plus Top)
    dump_specialization_map: true
    sv: |
      module Bank #(parameter int WIDTH = 8, parameter int ID = 0);
        bit [WIDTH-1:0] data;
        initial begin
          data = '1;
          $display("id=%0d d=%0d", ID, data);
        end
      endmodule

      module Top;
        Bank #(.WIDTH(4), .ID(10)) b0();
        Bank #(.WIDTH(4), .ID(20)) b1();
      endmodule
    expect:
      compiler_output:
        contains:
          - "spec_groups: 2"
          - "spec[0]: def=0"
          - "spec[1]: def=1"
          - "instances=2"

  - name: multiple_definitions
    description: Instances of different definitions -> separate groups
    dump_specialization_map: true
    sv: |
      module Alpha;
        initial $display("alpha");
      endmodule

      module Beta;
        initial $display("beta");
      endmodule

      module Top;
        Alpha a0();
        Alpha a1();
        Beta b0();
      endmodule
    expect:
      compiler_output:
        contains:
          - "spec_groups: 3"
          - "spec[0]: def=0"
          - "spec[1]: def=1"
          - "spec[2]: def=2"
          - "def=1"
          - "instances=2"
          - "instances=1"

  - name: deterministic_ordering
    description: Groups are sorted by (def_id, fingerprint) for determinism
    dump_specialization_map: true
    sv: |
      module Leaf;
        initial $display("leaf");
      endmodule

      module Mid;
        Leaf l0();
        Leaf l1();
      endmodule

      module Top;
        Mid m0();
      endmodule
    expect:
      compiler_output:
        contains:
          - "spec_groups: 3"
          - "spec[0]: def=0"
          - "spec[1]: def=1"
          - "spec[2]: def=2"

  - name: definition_scoped_type_store_includes_inactive_generate_branches
    description: >
      The type store is definition-scoped: it includes types from ALL
      generate branches (active and inactive), not just the instantiated
      path. Here MODE=0 activates bit[7:0] and MODE=1 activates bit[15:0],
      but both instances see both types in their type store. If the store
      were instance-scoped (only the active branch), these would produce
      different fingerprints and incorrectly split into separate
      specializations. This test is the load-bearing proof that
      BuildArtifactInventory walks uninstantiated GenerateBlockSymbols.
    dump_specialization_map: true
    sv: |
      module Gated #(parameter int MODE = 0);
        if (MODE == 0) begin : g
          bit [7:0] val8;
          initial begin
            val8 = 8'hAB;
            $display("mode0 v=%h", val8);
          end
        end else begin : g
          bit [15:0] val16;
          initial begin
            val16 = 16'hCDEF;
            $display("mode1 v=%h", val16);
          end
        end
      endmodule

      module Top;
        Gated #(.MODE(0)) g0();
        Gated #(.MODE(1)) g1();
      endmodule
    expect:
      compiler_output:
        contains:
          - "spec_groups: 2"
          - "spec[1]: def=1"
          - "instances=2"

  - name: generate_same_types_same_specialization
    description: >
      Generate branches that use the same packed types are grouped into
      one specialization. The branch selection is constructor-time; the
      compiled representation is the same.
    dump_specialization_map: true
    sv: |
      module Selector #(parameter int MODE = 0);
        bit [7:0] data;
        if (MODE == 0) begin : g
          initial begin
            data = 8'hAB;
            $display("mode0 d=%h", data);
          end
        end else begin : g
          initial begin
            data = 8'hCD;
            $display("mode1 d=%h", data);
          end
        end
      endmodule

      module Top;
        Selector #(.MODE(0)) s0();
        Selector #(.MODE(1)) s1();
      endmodule
    expect:
      compiler_output:
        contains:
          - "spec_groups: 2"
          - "spec[1]: def=1"
          - "instances=2"

  - name: packed_width_splits_specialization
    description: >
      Parameter-dependent packed width changes compiled representation.
      Different packed widths produce different type store entries and
      must split into separate specializations.
    dump_specialization_map: true
    sv: |
      module Sized #(parameter int WIDTH = 8);
        bit [WIDTH-1:0] data;
        initial begin
          data = '1;
          $display("w=%0d d=%0d", WIDTH, data);
        end
      endmodule

      module Top;
        Sized #(.WIDTH(8)) s8();
        Sized #(.WIDTH(16)) s16();
      endmodule
    expect:
      compiler_output:
        contains:
          - "spec_groups: 3"
          - "instances=1"

  - name: unpacked_dimension_does_not_split
    description: >
      Unpacked array dimensions are constructor-owned, not compile-owned.
      Different unpacked depths with the same packed element type produce
      identical compile-owned type store entries and must group into one
      specialization. Layout uses instance-aware stable/unstable slot
      classification: slots with varying offsets load from per-instance
      metadata at runtime.
    dump_specialization_map: true
    sv: |
      module Mem #(parameter int DEPTH = 4);
        bit [7:0] data [DEPTH];
        initial begin
          data[0] = 8'hAB;
          $display("depth=%0d v=%h", DEPTH, data[0]);
        end
      endmodule

      module Top;
        Mem #(.DEPTH(4)) m4();
        Mem #(.DEPTH(8)) m8();
      endmodule
    expect:
      compiler_output:
        contains:
          - "spec_groups: 2"
          - "spec[1]: def=1"
          - "instances=2"
      stdout:
        contains:
          - "depth=4 v=ab"
          - "depth=8 v=ab"

  - name: packed_width_splits_with_unpacked_depth_variation
    description: >
      Cross-product test: packed width creates separate specializations,
      and within each specialization, different unpacked depths are
      constructor-owned. Verifies that spec-local layout classification
      works independently per specialization, not globally per body_id.
    dump_specialization_map: true
    sv: |
      module Mem #(parameter int WIDTH = 8, parameter int DEPTH = 4);
        bit [WIDTH-1:0] data [DEPTH];
        initial begin
          data[0] = '1;
          $display("w=%0d d=%0d v=%h", WIDTH, DEPTH, data[0]);
        end
      endmodule

      module Top;
        Mem #(.WIDTH(8),  .DEPTH(4)) m8_4();
        Mem #(.WIDTH(8),  .DEPTH(8)) m8_8();
        Mem #(.WIDTH(16), .DEPTH(2)) m16_2();
        Mem #(.WIDTH(16), .DEPTH(6)) m16_6();
      endmodule
    expect:
      compiler_output:
        contains:
          - "spec_groups: 3"
      stdout:
        contains:
          - "w=8 d=4 v=ff"
          - "w=8 d=8 v=ff"
          - "w=16 d=2 v=ffff"
          - "w=16 d=6 v=ffff"
