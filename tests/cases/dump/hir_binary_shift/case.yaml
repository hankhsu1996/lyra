id: dump.hir_binary_shift
tags: [dump]
input:
  command: [dump, hir]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "BinaryExpr op=LogicalShiftLeft"
      - "BinaryExpr op=ArithmeticShiftLeft"
      - "BinaryExpr op=LogicalShiftRight"
      - "BinaryExpr op=ArithmeticShiftRight"
