id: dump.loop_generate_inline
tags: [dump]
input:
  command: [dump, hir]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - 'LoopVarDecl[0] "i"'
      - "Generate LoopGenerate loop_var=LoopVar[0]"
      - "BinaryExpr op=LessThan"
      - "RefExpr LoopVar[0](hops=0)"
      - "AssignExpr"
      - "BinaryExpr op=Add"
      - "scope:"
