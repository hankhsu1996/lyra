id: errors.unsupported_type
tags: [errors, diag, diag-struct]
input:
  command: [emit, cpp]
  project: false
  top: Top
  files: [main.sv]
  args: ["--no-color"]
expect:
  exit: 1
  stderr:
    contains:
      - "main.sv:2:"
      - "unsupported:"
      - "queue types are not supported"
      - "logic q [$];"
    not_contains:
      - "internal error"
      - "\x1b["
  diagnostics:
    - code: unsupported_queue_type
      kind: unsupported
      category: type
      file: main.sv
      line: 2
