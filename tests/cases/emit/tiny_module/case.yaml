id: emit.tiny_module
tags: [emit, basic]
input:
  command: [emit, cpp]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "=== Top.hpp ==="
      - "=== main.cpp ==="
      - "class Top final : public lyra::runtime::Module"
      - "public:"
      - "std::int32_t x;"
      - "std::int32_t y;"
      - "Top() {}"
      - "void Bind(lyra::runtime::RuntimeBindContext& ctx) override"
      - "auto main() -> int"
      - 'engine.BindRoot("top", top)'
      - "return engine.Run()"
