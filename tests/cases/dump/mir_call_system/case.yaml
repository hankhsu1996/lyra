id: dump.mir_call_system
tags: [dump]
input:
  command: [dump, mir]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "RuntimeCallExpr"
      - "RuntimePrintCall kind=kDisplay descriptor=stdout items=1"
      - "RuntimePrintCall kind=kWrite descriptor=stdout items=1"
      - "Item[0] Value value=Expr["
      - "Stmt[0] ExprStmt expr=Expr["
