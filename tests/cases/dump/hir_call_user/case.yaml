id: dump.hir_call_user
tags: [dump]
input:
  command: [dump, hir]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "Process (Initial)"
      - "Subroutine[0] function \"add\""
      - "Subroutine[1] task \"do_thing\""
      - "CallExpr callee=UserSubroutine[0](hops=0) \"add\" args=[Expr[1], Expr[2]]"
      - "CallExpr callee=UserSubroutine[1](hops=0) \"do_thing\" args=[Expr[5]]"
