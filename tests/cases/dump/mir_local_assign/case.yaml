id: dump.mir_local_assign
tags: [dump]
input:
  command: [dump, mir]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "Process[0] Initial"
      - "ProceduralVar[0] \"x\""
      - "ProceduralVarDeclStmt target=ProceduralVarRef[hops=0, var=0]"
      - "ExprStmt"
      - "AssignExpr target=ProceduralVarRef[hops=0, var=0]"
      - "BinaryExpr op=Add"
      - "IntegerLiteral(32's{value=0x1})"
      - "IntegerLiteral(32's{value=0x2})"
