feature: cross-process opposite-polarity edge subscription
description: >
  Posedge wait on a signal is never delivered when another process has a
  negedge subscription on the same signal. The EdgeWatchGroup shares
  last_bit state across polarity buckets, so the 0->1 transition updates
  last_bit to 1 but only wakes negedge subscribers (wrong bucket selected)
  or the posedge subscriber is never evaluated because the group considers
  the transition already consumed.

  Root cause: FlushSlotEdgeGroups dispatches to exactly one polarity bucket
  per transition and updates last_bit unconditionally. If a posedge waiter
  was installed after the group was created by a negedge subscriber, the
  posedge event is silently lost.

  Discovered via ibex timeout: the testbench's @(posedge rst_n) never fires
  because always_ff @(posedge clk or negedge rst_n) owns the EdgeWatchGroup.

cases:
  - name: cross_process_opposite_polarity
    description: >
      @(posedge rst_n) in initial block must fire even when always_ff has
      negedge rst_n in its sensitivity list.
    sv: |
      module Test;
        bit clk = 0;
        logic rst_n;
        int result = 0;

        initial begin
          clk = 0;
          forever #10 clk = ~clk;
        end

        initial begin
          rst_n = 0;
          repeat(5) @(posedge clk);
          rst_n = 1;
        end

        logic [31:0] q;
        always_ff @(posedge clk or negedge rst_n) begin
          if (!rst_n) q <= 0;
          else q <= q + 1;
        end

        initial begin
          @(posedge rst_n);
          repeat(3) @(posedge clk);
          result = q;
          $finish;
        end
      endmodule
    expect:
      variables:
        result: 3
