id: emit.generate_if
tags: [emit, generate]
input:
  command: [emit, cpp]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "=== Top.hpp ==="
      - "=== main.cpp ==="
      - "class Top final : public lyra::runtime::Module"
      - "class gen0_then"
      - "class gen1_case0"
      - "class gen1_case1"
      - "class gen1_default"
      - "gen0_then* gen0_then_obj{};"
      - "gen1_case0* gen1_case0_obj{};"
      - "gen1_default* gen1_default_obj{};"
      - "Top() {"
      - "if (1) {"
      - "gen0_then_obj = new gen0_then();"
      - "switch (1) {"
      - "case 0:"
      - "gen1_case0_obj = new gen1_case0();"
      - "default:"
      - "gen1_default_obj = new gen1_default();"
      - "void Bind(lyra::runtime::RuntimeBindContext& ctx) override"
      - "ctx.CreateChildScope("
      - '"gen0_then"'
      - "lyra::runtime::RuntimeScopeKind::kGenerate"
      - "gen0_then_obj->Bind(child)"
      - "auto process_0() -> lyra::runtime::Process"
      - "co_return;"
      - "(x = 1);"
      - "ctx.AddProcess("
      - "lyra::runtime::ProcessKind::kInitial"
      - "process_0()"
