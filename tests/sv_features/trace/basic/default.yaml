feature: trace
description: Tests for simulation tracing subsystem

cases:
  - name: trace-summary-appears
    description: Trace summary line appears when trace is enabled
    sv: |
      module Test;
        logic [7:0] a;
        initial begin
          a = 8'h42;
          $display("done");
        end
      endmodule
    trace_summary: true
    expect:
      stdout:
        contains:
          - "done"
          - "__LYRA_TRACE__:"
          - "time_advances="
          - "value_changes="

  - name: trace-disabled-no-output
    description: No trace output when trace is disabled
    sv: |
      module Test;
        logic [7:0] a;
        initial begin
          a = 8'h42;
          $display("done");
        end
      endmodule
    expect:
      stdout:
        contains:
          - "done"
        not_contains:
          - "__LYRA_TRACE__"

  - name: trace-time-advance
    description: TimeAdvance event at time 0 is recorded
    sv: |
      module Test;
        initial begin
          $display("ok");
        end
      endmodule
    trace_summary: true
    expect:
      stdout:
        contains:
          - "ok"
          - "time_advances=1"

  - name: trace-multi-time
    description: Multiple time slots produce multiple TimeAdvance events
    sv: |
      module Test;
        logic [7:0] a;
        initial begin
          a = 8'h01;
          #10;
          a = 8'h02;
          $display("done");
        end
      endmodule
    trace_summary: true
    expect:
      stdout:
        contains:
          - "done"
          - "time_advances=2"
          - "value_changes="

  - name: trace-string-value-change
    description: String design slot with tracing enabled (exercises SnapshotString on JIT/LLI)
    sv: |
      module Test;
        string s;
        initial begin
          s = "hello";
          $display("s=%s", s);
        end
      endmodule
    trace_summary: true
    expect:
      stdout:
        contains:
          - "s=hello"
          - "__LYRA_TRACE__:"
          - "value_changes="

  - name: trace-no-writes-zero-counts
    description: Trace enabled with no design slot writes produces zero value/memory counts
    sv: |
      module Test;
        initial $display("done");
      endmodule
    trace_summary: true
    expect:
      stdout:
        contains:
          - "done"
          - "__LYRA_TRACE__: time_advances=1 value_changes=0 memory_dirty=0"
        not_contains:
          - "__LYRA_TRACE_SLOT__"

  - name: trace-exact-summary-format
    description: Summary format is stable and exact for a known scenario
    sv: |
      module Test;
        logic [7:0] a;
        logic [7:0] b;
        initial begin
          a = 8'h01;
          b = 8'h02;
          #10;
          a = 8'h03;
          $display("done");
        end
      endmodule
    trace_summary: true
    expect:
      stdout:
        contains:
          - "done"
          - "time_advances=2"
          - "value_changes="
          - "memory_dirty=0"

  - name: trace-local-multi-instance-summary
    description: Summary trace distinguishes local signals from different instances by path
    sv: |
      module Child;
        logic [7:0] x;
        initial x = 8'haa;
      endmodule

      module Test;
        Child u0();
        Child u1();
        initial $display("done");
      endmodule
    trace_summary: true
    expect:
      stdout:
        contains:
          - "done"
          - "instance='Test.u0'"
          - "instance='Test.u1'"
        not_contains:
          - "instance=0"
          - "instance=1"
          - "instance=2"
