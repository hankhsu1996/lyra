feature: hierarchy_param_slots
description: Tests value-only params promoted to read-only instance slots

cases:
  - name: banked_value_only_param
    description: Value-only param ID promoted to instance slot, each instance prints unique value
    sv: |
      module Bank #(parameter int ID = 0);
        initial $display("bank %0d", ID);
      endmodule

      module Top;
        Bank #(.ID(0)) b0();
        Bank #(.ID(1)) b1();
        Bank #(.ID(2)) b2();
      endmodule
    expect:
      stdout: "bank 0\nbank 1\nbank 2\n"

  - name: value_only_param_in_expression
    description: Value-only param used in arithmetic expression
    sv: |
      module Adder #(parameter int OFFSET = 0);
        initial $display("result=%0d", 10 + OFFSET);
      endmodule

      module Top;
        Adder #(.OFFSET(5)) a0();
        Adder #(.OFFSET(20)) a1();
      endmodule
    expect:
      stdout: "result=15\nresult=30\n"

  - name: shape_param_not_promoted
    description: Different packed width -> different specializations (3 spec groups)
    dump_specialization_map: true
    sv: |
      module Sized #(parameter int WIDTH = 8);
        bit [WIDTH-1:0] data;
        initial begin
          data = '1;
          $display("width=%0d data=%0d", WIDTH, data);
        end
      endmodule

      module Top;
        Sized #(.WIDTH(4)) s4();
        Sized #(.WIDTH(8)) s8();
      endmodule
    expect:
      stdout: "width=4 data=15\nwidth=8 data=255\n"
      compiler_output:
        contains:
          - "spec_groups: 3"

  - name: mixed_shape_and_value_params
    description: Module with both shape and value-only params
    sv: |
      module Mixed #(parameter int WIDTH = 8, parameter int ID = 0);
        bit [WIDTH-1:0] data;
        initial begin
          data = '1;
          $display("id=%0d width=%0d data=%0d", ID, WIDTH, data);
        end
      endmodule

      module Top;
        Mixed #(.WIDTH(4), .ID(10)) m0();
        Mixed #(.WIDTH(4), .ID(20)) m1();
      endmodule
    expect:
      stdout: "id=10 width=4 data=15\nid=20 width=4 data=15\n"

  - name: single_instance_packed_width_shape_param
    description: >
      Single instance -> no param transmission.
      count=1 is the data variable (bit[WIDTH-1:0]), not a parameter slot.
    dump_slot_meta: true
    dump_specialization_map: true
    sv: |
      module Unit #(parameter int WIDTH = 8);
        bit [WIDTH-1:0] data;
        initial begin
          data = '1;
          $display("w=%0d d=%0d", WIDTH, data);
        end
      endmodule
      module Top;
        Unit #(.WIDTH(4)) u0();
      endmodule
    expect:
      stdout:
        contains:
          - "w=4 d=15"
          - "count=1"
      compiler_output:
        contains:
          - "spec_groups: 2"

  - name: packed_width_param_via_localparam
    description: Localparam chain into packed width -> different specializations (3 spec groups)
    dump_specialization_map: true
    sv: |
      module Chain #(parameter int N = 4);
        localparam int W = N * 2;
        bit [W-1:0] data;
        initial begin
          data = '1;
          $display("n=%0d w=%0d d=%0d", N, W, data);
        end
      endmodule
      module Top;
        Chain #(.N(2)) c0();
        Chain #(.N(4)) c1();
      endmodule
    expect:
      stdout: "n=2 w=4 d=15\nn=4 w=8 d=255\n"
      compiler_output:
        contains:
          - "spec_groups: 3"

  - name: all_instances_same_value
    description: >
      Identical values -> one specialization, no transmitted slots.
      All instances have identical VAL -- absorbed, zero param slots.
      count=0 proves no design-global slots allocated.
      spec_groups=2 proves Uniform instances share one specialization (plus Top).
    dump_slot_meta: true
    dump_specialization_map: true
    sv: |
      module Uniform #(parameter int VAL = 42);
        initial $display("val=%0d", VAL);
      endmodule

      module Top;
        Uniform #(.VAL(42)) u0();
        Uniform #(.VAL(42)) u1();
        Uniform #(.VAL(42)) u2();
      endmodule
    expect:
      stdout:
        contains:
          - "val=42"
          - "count=0"
      compiler_output:
        contains:
          - "spec_groups: 2"
          - "instances=3"

  - name: three_way_value_variance
    description: >
      Three instances with different value-only param -- all transmitted.
      No compile-owned declarations differ, so all share one specialization.
      spec_groups=2 proves Triple instances share one specialization (plus Top).
      instances=3 proves all three are in the same group.
    dump_specialization_map: true
    sv: |
      module Triple #(parameter int X = 0);
        initial $display("x=%0d", X);
      endmodule

      module Top;
        Triple #(.X(10)) t0();
        Triple #(.X(20)) t1();
        Triple #(.X(30)) t2();
      endmodule
    expect:
      stdout: "x=10\nx=20\nx=30\n"
      compiler_output:
        contains:
          - "spec_groups: 2"
          - "instances=3"

  - name: mixed_absorbed_and_transmitted
    description: >
      Same compile-owned body shape + different runtime-only param -> one specialization.
      BASE is constant across the group (absorbed, no slot).
      ID varies across the group (transmitted, gets a slot per instance).
      count=2 proves exactly 2 param slots exist (one per instance for ID).
      spec_groups=2 proves Dual instances share one specialization (plus Top).
    dump_slot_meta: true
    dump_specialization_map: true
    sv: |
      module Dual #(parameter int BASE = 0, parameter int ID = 0);
        initial $display("base=%0d id=%0d", BASE, ID);
      endmodule

      module Top;
        Dual #(.BASE(100), .ID(1)) d0();
        Dual #(.BASE(100), .ID(2)) d1();
      endmodule
    expect:
      stdout:
        contains:
          - "base=100 id=1"
          - "base=100 id=2"
          - "count=2"
      compiler_output:
        contains:
          - "spec_groups: 2"
          - "instances=2"

  - name: value_param_in_conditional
    description: Runtime-only param does not split specialization (2 spec groups)
    dump_specialization_map: true
    sv: |
      module Selector #(parameter int MODE = 0);
        initial begin
          if (MODE == 0)
            $display("mode A");
          else
            $display("mode B");
        end
      endmodule

      module Top;
        Selector #(.MODE(0)) s0();
        Selector #(.MODE(1)) s1();
      endmodule
    expect:
      stdout: "mode A\nmode B\n"
      compiler_output:
        contains:
          - "spec_groups: 2"
          - "instances=2"
