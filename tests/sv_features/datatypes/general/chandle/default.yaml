feature: chandle_type
description: >
  chandle type support: declaration, null assignment, variable-to-variable
  assignment, equality/inequality with null, and DPI parameter declarations.

cases:
  - name: chandle_dpi_input_param
    sv: |
      module Test;
        import "DPI-C" function void ch_in(chandle h);
        initial begin end
      endmodule

  - name: chandle_dpi_output_param
    sv: |
      module Test;
        import "DPI-C" function void ch_out(output chandle h);
        initial begin end
      endmodule

  - name: chandle_dpi_inout_param
    sv: |
      module Test;
        import "DPI-C" function void ch_inout(inout chandle h);
        initial begin end
      endmodule

  - name: chandle_dpi_return
    sv: |
      module Test;
        import "DPI-C" function chandle ch_ret();
        initial begin end
      endmodule

  - name: chandle_null_assign
    sv: |
      module Test;
        chandle h;
        initial begin
          h = null;
          if (h == null)
            $display("PASS chandle_null_assign");
        end
      endmodule
    expect:
      stdout:
        contains:
          - "PASS chandle_null_assign"

  - name: chandle_variable_copy
    sv: |
      module Test;
        chandle a, b;
        initial begin
          b = null;
          a = b;
          if (a == null)
            $display("PASS chandle_variable_copy");
        end
      endmodule
    expect:
      stdout:
        contains:
          - "PASS chandle_variable_copy"

  - name: chandle_not_equal_null
    sv: |
      module Test;
        chandle h;
        initial begin
          h = null;
          if (h != null)
            $display("FAIL");
          else
            $display("PASS chandle_not_equal_null");
        end
      endmodule
    expect:
      stdout:
        contains:
          - "PASS chandle_not_equal_null"
