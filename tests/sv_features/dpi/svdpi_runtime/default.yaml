feature: dpi_svdpi_runtime
description: svdpi.h runtime library utility functions (D6a)

cases:
  - name: svdpi_version_available
    dpi_sources:
      - dpi_helpers/svdpi_utils.c
    sv: |
      module Test;
        import "DPI-C" pure function int test_svdpi_version();
        int result;
        initial begin
          result = test_svdpi_version();
        end
      endmodule
    expect:
      variables:
        result: 1

