feature: repertoire_descriptor
description: Definition-owned repertoire descriptor with pointer-free coordinates

cases:
  - name: generate_if_branch_ordinals
    description: >
      Branch alternatives are normalized to ordinals by source order.
      Both branches of a generate-if get deterministic alt indices.
    dump_repertoire_desc: true
    sv: |
      module Top #(parameter bit SEL = 1);
        generate
          if (SEL) begin : gen_true
            logic [7:0] data_a;
            always_comb $display("true branch");
          end else begin : gen_false
            logic [7:0] data_b;
            always_comb $display("false branch");
          end
        endgenerate
      endmodule
    expect:
      compiler_output:
        contains:
          - 'decl #0 "data_a" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=0)]'
          - 'decl #0 "data_b" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=1)]'
          - "proc always_comb#0 coord=[branch(ci=1,alt=0)]"
          - "proc always_comb#0 coord=[branch(ci=1,alt=1)]"

  - name: generate_case_branch_ordinals
    description: >
      Generate-case alternatives get source-order branch ordinals
      under the same construct index. Exact match proves sort order.
    dump_repertoire_desc: true
    sv: |
      module Top;
        generate
          case (0)
            0: begin : mode_zero
              logic [7:0] val_a;
            end
            1: begin : mode_one
              logic [7:0] val_b;
            end
            2: begin : mode_two
              logic [7:0] val_c;
            end
          endcase
        endgenerate
      endmodule
    expect:
      compiler_output: |
        --- Top (Top) ---
          decl #0 "val_a" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=0)]
          decl #0 "val_b" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=1)]
          decl #0 "val_c" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=2)]

  - name: generate_for_entries
    description: >
      Generate-for entries are preserved with individual entry coordinates.
      Exact match proves canonical sort order.
    dump_repertoire_desc: true
    sv: |
      module Top;
        generate
          for (genvar i = 0; i < 3; i++) begin : gen_loop
            logic [7:0] data;
          end
        endgenerate
      endmodule
    expect:
      compiler_output: |
        --- Top (Top) ---
          decl #0 "data" packed_array<integral<1,u,4s>>[7:0] coord=[entry(ci=1,idx=0)]
          decl #0 "data" packed_array<integral<1,u,4s>>[7:0] coord=[entry(ci=1,idx=1)]
          decl #0 "data" packed_array<integral<1,u,4s>>[7:0] coord=[entry(ci=1,idx=2)]

  - name: nested_coordinates
    description: >
      Nested generate paths accumulate correctly. Outer artifact has
      one-step coord; inner artifact has two-step coord.
    dump_repertoire_desc: true
    sv: |
      module Inner;
        initial $display("inner");
      endmodule

      module Top #(parameter bit SEL = 1);
        generate
          if (SEL) begin : gen_outer
            logic [7:0] outer_var;
            Inner inner_inst();
            if (SEL) begin : gen_inner
              logic [7:0] inner_var;
            end
          end
        endgenerate
      endmodule
    expect:
      compiler_output:
        contains:
          - 'decl #0 "outer_var" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=0)]'
          - 'decl #0 "inner_var" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=0), branch(ci=1,alt=0)]'
          - 'inst "inner_inst"->"Inner" coord=[branch(ci=1,alt=0)]'

  - name: unconditional_artifacts
    description: >
      Artifacts not inside any generate have empty coordinates.
      Exact match proves canonical sort order (decl before proc).
    dump_repertoire_desc: true
    sv: |
      module Top;
        logic [7:0] x;
        initial $display("hello");
      endmodule
    expect:
      compiler_output: |
        --- Top (Top) ---
          decl #0 "x" packed_array<integral<1,u,4s>>[7:0] coord=[]
          proc initial#0 coord=[]

  - name: child_instance_payload
    description: >
      Child instance records both instance name and target definition name.
    dump_repertoire_desc: true
    sv: |
      module Child;
        logic [7:0] data;
      endmodule

      module Top;
        Child u0();
        Child u1();
      endmodule
    expect:
      compiler_output:
        contains:
          - 'inst "u0"->"Child" coord=[]'
          - 'inst "u1"->"Child" coord=[]'

  - name: coordinate_local_ordinals
    description: >
      Multiple processes under the same coordinate get bucket-local
      ordinals. Each coordinate bucket starts at 0.
    dump_repertoire_desc: true
    sv: |
      module Top #(parameter bit SEL = 1);
        always_comb $display("unconditional 0");
        always_comb $display("unconditional 1");
        generate
          if (SEL) begin : gen_a
            always_comb $display("branch a 0");
            always_comb $display("branch a 1");
          end
        endgenerate
      endmodule
    expect:
      compiler_output:
        contains:
          - "proc always_comb#0 coord=[]"
          - "proc always_comb#1 coord=[]"
          - "proc always_comb#0 coord=[branch(ci=1,alt=0)]"
          - "proc always_comb#1 coord=[branch(ci=1,alt=0)]"

  - name: two_constructs_same_parent
    description: >
      Two separate generate-if constructs in the same parent scope get
      distinct construct indices via different constructIndex values.
    dump_repertoire_desc: true
    sv: |
      module Top #(parameter bit A = 1, parameter bit B = 0);
        generate
          if (A) begin : gen_first
            logic [7:0] var_a;
          end
          if (B) begin : gen_second
            logic [7:0] var_b;
          end else begin : gen_second_else
            logic [7:0] var_c;
          end
        endgenerate
      endmodule
    expect:
      compiler_output:
        contains:
          - 'decl #0 "var_a" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=0)]'
          - 'decl #0 "var_b" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=2,alt=0)]'
          - 'decl #0 "var_c" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=2,alt=1)]'

  - name: nested_for_inside_if
    description: >
      Generate-for nested inside generate-if produces two-step coordinates
      combining branch and entry steps. Exact match proves sort order.
    dump_repertoire_desc: true
    sv: |
      module Top;
        generate
          if (1) begin : gen_branch
            for (genvar i = 0; i < 2; i++) begin : gen_loop
              logic [7:0] data;
            end
          end
        endgenerate
      endmodule
    expect:
      compiler_output: |
        --- Top (Top) ---
          decl #0 "data" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=0), entry(ci=1,idx=0)]
          decl #0 "data" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=0), entry(ci=1,idx=1)]

  - name: sorted_artifacts_canonical_order
    description: >
      Artifacts are sorted deterministically: coord first, then kind,
      then payload. Decls sort by ordinal (encounter order, not name).
      Processes by (kind, ordinal). Source order differs from canonical
      order only for process kinds. Exact match proves sorting.
    dump_repertoire_desc: true
    sv: |
      module Top;
        always_comb $display("proc");
        logic [7:0] z_var;
        logic [7:0] a_var;
        initial $display("init");
      endmodule
    expect:
      compiler_output: |
        --- Top (Top) ---
          decl #0 "z_var" packed_array<integral<1,u,4s>>[7:0] coord=[]
          decl #1 "a_var" packed_array<integral<1,u,4s>>[7:0] coord=[]
          proc initial#0 coord=[]
          proc always_comb#0 coord=[]

  - name: same_name_different_packed_width
    description: >
      Same decl name under different coordinates can have different
      compile-owned types. Type representations differ when widths differ.
    dump_repertoire_desc: true
    sv: |
      module Top #(parameter bit SEL = 1);
        generate
          if (SEL) begin : gen_a
            logic [7:0] data;
          end else begin : gen_b
            logic [15:0] data;
          end
        endgenerate
      endmodule
    expect:
      compiler_output:
        contains:
          - 'decl #0 "data" packed_array<integral<1,u,4s>>[7:0] coord=[branch(ci=1,alt=0)]'
          - 'decl #0 "data" packed_array<integral<1,u,4s>>[15:0] coord=[branch(ci=1,alt=1)]'

  - name: unpacked_array_strips_dimension
    description: >
      Different unpacked array sizes produce the same compile-owned type
      representation because dimensions are runtime-owned.
    dump_repertoire_desc: true
    sv: |
      module Top;
        logic [7:0] arr_small [0:3];
        logic [7:0] arr_large [0:15];
      endmodule
    expect:
      compiler_output: |
        --- Top (Top) ---
          decl #0 "arr_small" unpacked_array<packed_array<integral<1,u,4s>>[7:0]> coord=[]
          decl #1 "arr_large" unpacked_array<packed_array<integral<1,u,4s>>[7:0]> coord=[]

  - name: packed_element_type_change
    description: >
      Same container shape (packed array) but different element types
      produce different compile-owned type representations.
    dump_repertoire_desc: true
    sv: |
      module Top;
        logic [3:0][7:0] byte_array;
        logic [3:0][15:0] word_array;
      endmodule
    expect:
      compiler_output:
        contains:
          - 'decl #0 "byte_array" packed_array<packed_array<integral<1,u,4s>>[7:0]>[3:0]'
          - 'decl #1 "word_array" packed_array<packed_array<integral<1,u,4s>>[15:0]>[3:0]'

  - name: decl_source_order_not_alphabetical
    description: >
      Two decls in one coordinate bucket get encounter-order ordinals.
      z_var comes first because it appears first in source, not because
      of alphabetical sorting.
    dump_repertoire_desc: true
    sv: |
      module Top;
        logic [7:0] z_var;
        logic [7:0] a_var;
      endmodule
    expect:
      compiler_output: |
        --- Top (Top) ---
          decl #0 "z_var" packed_array<integral<1,u,4s>>[7:0] coord=[]
          decl #1 "a_var" packed_array<integral<1,u,4s>>[7:0] coord=[]

  - name: shared_decl_type_ids
    description: >
      Two declarations with identical compile-owned type produce the
      same type representation in the dump.
    dump_repertoire_desc: true
    sv: |
      module Top;
        logic [7:0] x;
        logic [7:0] y;
      endmodule
    expect:
      compiler_output: |
        --- Top (Top) ---
          decl #0 "x" packed_array<integral<1,u,4s>>[7:0] coord=[]
          decl #1 "y" packed_array<integral<1,u,4s>>[7:0] coord=[]

  - name: two_state_integral
    description: >
      Two-state types (bit) are captured correctly in the type store.
    dump_repertoire_desc: true
    sv: |
      module Top;
        bit [7:0] data;
        int counter;
      endmodule
    expect:
      compiler_output: |
        --- Top (Top) ---
          decl #0 "data" packed_array<integral<1,u,2s>>[7:0] coord=[]
          decl #1 "counter" integral<32,s,2s> coord=[]

  - name: signed_integral
    description: >
      Signed types are captured correctly.
    dump_repertoire_desc: true
    sv: |
      module Top;
        logic signed [15:0] signed_val;
        integer int_val;
      endmodule
    expect:
      compiler_output:
        contains:
          - 'decl #0 "signed_val" packed_array<integral<1,s,4s>>[15:0]'
          - 'decl #1 "int_val" integral<32,s,4s>'
