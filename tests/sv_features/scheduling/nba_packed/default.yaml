feature: nba_packed
description: Non-blocking assignment to packed types (structs, arrays)

cases:
  - name: whole_packed_struct
    description: NBA to whole packed struct
    sv: |
      module Test;
        typedef struct packed { logic [7:0] a; logic [7:0] b; } Inner;
        Inner s;
        int result;
        initial begin
          s = '0;
          s <= '{a: 8'h12, b: 8'h34};
          #0;
          result = s.a;
        end
      endmodule
    expect:
      variables:
        result: 18

  - name: unpacked_array_element_const_index
    description: NBA to element of unpacked array with constant index
    sv: |
      module Test;
        typedef struct packed { logic [7:0] a; logic [7:0] b; } Elem;
        Elem arr[4];
        int result;
        initial begin
          arr[0] = '0;
          arr[0] <= '{a: 8'h55, b: 8'hAA};
          #0;
          result = arr[0].a;
        end
      endmodule
    expect:
      variables:
        result: 85

  - name: unpacked_array_element_dynamic_index
    description: NBA to element of unpacked array with dynamic index
    sv: |
      module Test;
        logic [63:0] arr[10];
        int idx;
        longint result;
        initial begin
          arr[0] = '0;
          idx = 0;
          arr[idx] <= 64'hDEADBEEFCAFEBABE;
          #0;
          result = arr[0];
        end
      endmodule
    expect:
      variables:
        result: "0xDEADBEEFCAFEBABE"

  - name: unpacked_2d_array_dynamic_first_index
    description: NBA to element of 2D unpacked array with dynamic outer index
    sv: |
      module Test;
        logic [31:0] arr[4][10];
        int i;
        int result;
        initial begin
          arr[0][0] = '0;
          i = 0;
          arr[i][0] <= 32'hCAFEBABE;
          #0;
          result = arr[0][0];
        end
      endmodule
    expect:
      variables:
        result: "0xCAFEBABE"

  - name: unpacked_2d_array_nba_inner_array
    description: NBA to inner array of 2D unpacked array
    sv: |
      module Test;
        logic [31:0] arr[4][10];
        int i;
        int result0, result9;
        initial begin
          arr[0][0] = 32'hDEADBEEF;
          arr[0][9] = 32'hCAFEBABE;
          i = 0;
          arr[i] <= '{default: '0};  // NBA to whole inner array
          #0;
          result0 = arr[0][0];
          result9 = arr[0][9];
        end
      endmodule
    expect:
      variables:
        result0: 0
        result9: 0

  - name: part_select_byte_aligned
    description: NBA via indexed part-select with byte-aligned offset
    sv: |
      module Test;
        logic [127:0] data;
        int result0, result1;
        initial begin
          data = '0;
          for (int i = 0; i < 4; i++)
            data[i*32 +: 32] <= 32'(i + 10);
          #0;
          result0 = int'(data[0 +: 32]);
          result1 = int'(data[32 +: 32]);
        end
      endmodule
    expect:
      variables:
        result0: 10
        result1: 11

  - name: part_select_non_byte_aligned
    description: NBA via indexed part-select with non-byte-aligned width
    sv: |
      module Test;
        logic [41:0] data;
        int result0, result1;
        initial begin
          data = '0;
          data[0 +: 7] <= 7'd100;
          data[7 +: 7] <= 7'd50;
          #0;
          result0 = int'(data[0 +: 7]);
          result1 = int'(data[7 +: 7]);
        end
      endmodule
    expect:
      variables:
        result0: 100
        result1: 50

  - name: part_select_overwrite_sequence
    description: Multiple NBA part-selects to same target, last-scheduled wins
    sv: |
      module Test;
        logic [63:0] data;
        int result;
        initial begin
          data = '0;
          data[0 +: 32] <= 32'hAAAAAAAA;
          data[0 +: 32] <= 32'hBBBBBBBB;
          #0;
          result = int'(data[0 +: 32]);
        end
      endmodule
    expect:
      variables:
        result: "0xBBBBBBBB"

  - name: part_select_wide_array
    description: NBA part-selects into a wide packed array (stress test)
    sv: |
      module Test;
        logic [255:0] data;
        int sum;
        initial begin
          data = '0;
          for (int i = 0; i < 8; i++)
            data[i*32 +: 32] <= 32'(i * 3 + 1);
          #0;
          sum = 0;
          for (int i = 0; i < 8; i++)
            sum = sum + int'(data[i*32 +: 32]);
        end
      endmodule
    expect:
      variables:
        sum: 92

  - name: part_select_byte_aligned_24bit_element
    description: NBA part-select with non-power-of-two element width (24-bit)
    sv: |
      module Test;
        logic [95:0] data;
        int result0, result1, result2, result3;
        initial begin
          data = '0;
          data[0 +: 24] <= 24'hABCDEF;
          data[24 +: 24] <= 24'h123456;
          data[48 +: 24] <= 24'h789ABC;
          data[72 +: 24] <= 24'hDEF012;
          #0;
          result0 = int'(data[0 +: 24]);
          result1 = int'(data[24 +: 24]);
          result2 = int'(data[48 +: 24]);
          result3 = int'(data[72 +: 24]);
        end
      endmodule
    expect:
      variables:
        result0: "0xABCDEF"
        result1: "0x123456"
        result2: "0x789ABC"
        result3: "0xDEF012"
