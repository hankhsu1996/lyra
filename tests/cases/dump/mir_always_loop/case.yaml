id: dump.mir_always_loop
tags: [dump]
input:
  command: [dump, mir]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "Process[0] Always"
      - "WhileStmt"
      - "condition: Expr["
      - "IntegerLiteral"
      - "scope (ProceduralScopeId=0):"
      - "BlockStmt scope=ProceduralScopeId{0}"
      - "ProceduralVar[0] \"x\""
      - "ProceduralVarDeclStmt target=ProceduralVarRef[hops=0, var=0]"
      - "AwaitStmt kind=AlwaysBackedge"
