feature: hierarchical_sensitivity

cases:
  - name: always_comb_hierarchical_read
    description: always_comb re-executes when hierarchical signal changes
    sv: |
      module Child;
        int value;
      endmodule

      module Top;
        Child u_child();
        int result;

        always_comb begin
          result = u_child.value + 1;
        end

        initial begin
          u_child.value = 10;
          #1;
          $display("result = %0d", result);

          u_child.value = 20;
          #1;
          $display("result = %0d", result);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "result = 11"
          - "result = 21"

  - name: always_comb_hierarchical_expression
    description: always_comb with hierarchical read in complex expression
    sv: |
      module Counter;
        int count;
      endmodule

      module Top;
        Counter u_counter();
        int doubled;
        int tripled;

        always_comb begin
          doubled = u_counter.count * 2;
          tripled = u_counter.count * 3;
        end

        initial begin
          u_counter.count = 5;
          #1;
          $display("doubled = %0d, tripled = %0d", doubled, tripled);

          u_counter.count = 7;
          #1;
          $display("doubled = %0d, tripled = %0d", doubled, tripled);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "doubled = 10, tripled = 15"
          - "doubled = 14, tripled = 21"

  - name: always_comb_multiple_hierarchical_reads
    description: always_comb with multiple hierarchical signals
    sv: |
      module Child;
        int a;
        int b;
      endmodule

      module Top;
        Child u_child();
        int sum;

        always_comb begin
          sum = u_child.a + u_child.b;
        end

        initial begin
          u_child.a = 10;
          u_child.b = 5;
          #1;
          $display("sum = %0d", sum);

          u_child.a = 20;
          #1;
          $display("sum = %0d", sum);

          u_child.b = 10;
          #1;
          $display("sum = %0d", sum);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "sum = 15"
          - "sum = 25"
          - "sum = 30"

  - name: nested_hierarchy_sensitivity
    description: always_comb with nested hierarchical read (grandchild)
    sv: |
      module Inner;
        int value;
      endmodule

      module Middle;
        Inner u_inner();
      endmodule

      module Top;
        Middle u_middle();
        int result;

        always_comb begin
          result = u_middle.u_inner.value * 2;
        end

        initial begin
          u_middle.u_inner.value = 5;
          #1;
          $display("result = %0d", result);

          u_middle.u_inner.value = 10;
          #1;
          $display("result = %0d", result);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "result = 10"
          - "result = 20"

  - name: mixed_local_and_hierarchical_sensitivity
    description: always_comb with both local and hierarchical signals
    sv: |
      module Child;
        int remote;
      endmodule

      module Top;
        Child u_child();
        int local_val;
        int result;

        always_comb begin
          result = local_val + u_child.remote;
        end

        initial begin
          local_val = 10;
          u_child.remote = 5;
          #1;
          $display("result = %0d", result);

          local_val = 20;
          #1;
          $display("result = %0d", result);

          u_child.remote = 15;
          #1;
          $display("result = %0d", result);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "result = 15"
          - "result = 25"
          - "result = 35"

  - name: cross_instance_edge_trigger
    description: always_ff with posedge trigger on child instance signal
    sv: |
      module ClkGen;
        logic clk;
        initial begin
          clk = 0;
          #5 clk = 1;
          #5 clk = 0;
          #5 clk = 1;
        end
      endmodule

      module Top;
        ClkGen u_clk();
        int count;

        always_ff @(posedge u_clk.clk) begin
          count <= count + 1;
        end

        initial begin
          count = 0;
          #20;
          $display("count = %0d", count);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "count = 2"

  - name: cross_instance_change_trigger
    description: always block with change trigger on child instance signal
    sv: |
      module Child;
        int value;
      endmodule

      module Top;
        Child u_child();
        int observed_count;

        always @(u_child.value) begin
          observed_count = observed_count + 1;
        end

        initial begin
          observed_count = 0;
          #1;
          u_child.value = 10;
          #1;
          u_child.value = 20;
          #1;
          u_child.value = 20;
          #1;
          $display("observed_count = %0d", observed_count);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "observed_count = 2"

  - name: cross_instance_negedge_trigger
    description: always_ff with negedge trigger on child instance signal
    sv: |
      module ClkGen;
        logic clk;
        initial begin
          clk = 1;
          #5 clk = 0;
          #5 clk = 1;
          #5 clk = 0;
        end
      endmodule

      module Top;
        ClkGen u_clk();
        int count;

        always_ff @(negedge u_clk.clk) begin
          count <= count + 1;
        end

        initial begin
          count = 0;
          #20;
          $display("count = %0d", count);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "count = 2"

  - name: cross_instance_comb_and_edge_combined
    description: always_comb dependency and always_ff edge trigger on same child
    sv: |
      module Source;
        logic clk;
        int data;
        initial begin
          clk = 0;
          data = 0;
          #5 data = 42;
          #5 clk = 1;
          #5 clk = 0;
          #5 data = 99;
          #5 clk = 1;
        end
      endmodule

      module Top;
        Source u_src();
        int comb_out;
        int sampled;

        always_comb begin
          comb_out = u_src.data + 1;
        end

        always_ff @(posedge u_src.clk) begin
          sampled <= u_src.data;
        end

        initial begin
          sampled = -1;
          #12;
          $display("comb_out = %0d", comb_out);
          $display("sampled = %0d", sampled);
          #20;
          $display("sampled = %0d", sampled);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "comb_out = 43"
          - "sampled = 42"
          - "sampled = 99"

  - name: cross_instance_multiple_children_trigger
    description: edge triggers from two different child instances
    sv: |
      module ClkA;
        logic clk;
        initial begin
          clk = 0;
          #10 clk = 1;
          #10 clk = 0;
        end
      endmodule

      module ClkB;
        logic clk;
        initial begin
          clk = 0;
          #15 clk = 1;
          #15 clk = 0;
        end
      endmodule

      module Top;
        ClkA u_a();
        ClkB u_b();
        int count_a;
        int count_b;

        always_ff @(posedge u_a.clk) begin
          count_a <= count_a + 1;
        end

        always_ff @(posedge u_b.clk) begin
          count_b <= count_b + 1;
        end

        initial begin
          count_a = 0;
          count_b = 0;
          #25;
          $display("count_a = %0d", count_a);
          $display("count_b = %0d", count_b);
        end
      endmodule
    expect:
      stdout:
        contains:
          - "count_a = 1"
          - "count_b = 1"
