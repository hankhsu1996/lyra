id: errors.process_kind_unsupported
tags: [errors, diag]
input:
  command: [dump, mir]
  project: false
  top: Top
  files: [main.sv]
  args: ["--no-color"]
expect:
  exit: 1
  stderr:
    contains:
      - "main.sv:2:"
      - "unsupported:"
      - "are not yet supported"
    not_contains:
      - "internal error"
