feature: unique_priority_case
description: Tests for unique/unique0/priority case statements (LRM 12.5.3)

cases:
  - name: priority_no_match_warning
    description: priority case warns when no item matches and no default
    sv: |
      module Test;
        int sel, result;
        initial begin
          sel = 5;
          result = 100;
          priority case (sel)
            0: result = 10;
            1: result = 20;
          endcase
          $display("done");
        end
      endmodule
    expect:
      variables:
        result: 100
      stdout:
        contains:
          - "warning"
          - "no matching case item"

  - name: priority_default_suppresses_warning
    description: default clause suppresses no-match warning
    sv: |
      module Test;
        int sel, result;
        initial begin
          sel = 5;
          result = 0;
          priority case (sel)
            0: result = 10;
            1: result = 20;
            default: result = 99;
          endcase
        end
      endmodule
    expect:
      variables:
        result: 99
      stdout:
        not_contains:
          - "warning"

  - name: unique_overlap_warning
    description: unique case warns when multiple items match
    sv: |
      module Test;
        int sel, result;
        initial begin
          sel = 1;
          result = 0;
          unique case (sel)
            1: result = 10;
            1: result = 20;
          endcase
          $display("done");
        end
      endmodule
    expect:
      variables:
        result: 10
      stdout:
        contains:
          - "warning"
          - "multiple case items match"

  - name: unique_no_match_warning
    description: unique case warns when no item matches
    sv: |
      module Test;
        int sel, result;
        initial begin
          sel = 5;
          result = 100;
          unique case (sel)
            0: result = 10;
            1: result = 20;
          endcase
          $display("done");
        end
      endmodule
    expect:
      variables:
        result: 100
      stdout:
        contains:
          - "warning"
          - "no matching case item"

  - name: unique0_no_match_no_warning
    description: unique0 case does NOT warn on no-match (key difference from unique)
    sv: |
      module Test;
        int sel, result;
        initial begin
          sel = 5;
          result = 100;
          unique0 case (sel)
            0: result = 10;
            1: result = 20;
          endcase
        end
      endmodule
    expect:
      variables:
        result: 100
      stdout:
        not_contains:
          - "warning"

  - name: unique_case_inside_function
    description: unique case inside a function called from process
    sv: |
      module Test;
        function automatic int decode(input int sel);
          unique case (sel)
            0: return 10;
            1: return 20;
            2: return 30;
            default: return 99;
          endcase
        endfunction
        initial begin
          $display("result=%0d", decode(1));
        end
      endmodule
    expect:
      stdout:
        contains:
          - "result=20"

  - name: unique_case_nested_function_chain
    description: process -> wrapper -> classify (unique case) works via ABI propagation
    sv: |
      module Test;
        function automatic int classify(input int x);
          unique case (x)
            0: return 100;
            1: return 200;
            default: return 999;
          endcase
        endfunction
        function automatic int wrapper(input int x);
          return classify(x) + 1;
        endfunction
        initial begin
          $display("nested=%0d", wrapper(1));
        end
      endmodule
    expect:
      stdout:
        contains:
          - "nested=201"

  - name: priority_case_inside_function
    description: priority case inside a function called from process
    sv: |
      module Test;
        function automatic int prio_decode(input int sel);
          priority case (sel)
            0: return 10;
            1: return 20;
            default: return 99;
          endcase
        endfunction
        initial begin
          $display("prio=%0d", prio_decode(1));
        end
      endmodule
    expect:
      stdout:
        contains:
          - "prio=20"

  - name: unique0_case_inside_function
    description: unique0 case inside a function called from process
    sv: |
      module Test;
        function automatic int u0_decode(input int sel);
          unique0 case (sel)
            0: return 10;
            1: return 20;
          endcase
          return 99;
        endfunction
        initial begin
          $display("u0=%0d", u0_decode(1));
        end
      endmodule
    expect:
      stdout:
        contains:
          - "u0=20"
