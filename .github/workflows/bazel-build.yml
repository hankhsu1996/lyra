name: Bazel Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      src_files: ${{ steps.filter.outputs.src_files }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: shell
          filters: |
            src:
              - 'src/**'
              - 'include/**'
              - 'tests/**'
              - 'examples/**'
              - 'BUILD.bazel'
              - 'MODULE.bazel'
              - '.bazelrc'
              - '.github/workflows/bazel-build.yml'

      - name: Log detected changes
        run: |
          echo "### Change Detection" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.filter.outputs.src }}" == "true" ]]; then
            echo "Source changes detected:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.filter.outputs.src_files }}" | tr ' ' '\n' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No source changes detected. Build will be skipped." >> $GITHUB_STEP_SUMMARY
          fi

  build:
    name: Build
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.16.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ hashFiles('MODULE.bazel') }}
          repository-cache: true

      - name: Build
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          RBE_FLAGS=""
          if [[ -n "$BUILDBUDDY_API_KEY" ]]; then
            RBE_FLAGS="--config=rbe --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY"
          fi
          bazel build //... $RBE_FLAGS

  test:
    name: Test (${{ matrix.name }})
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MIR
            target: //tests:mir_dev_tests
            extra_flags: ""
          - name: JIT 0
            target: //tests:jit_dev_tests_shard0
            extra_flags: ""
          - name: JIT 1
            target: //tests:jit_dev_tests_shard1
            extra_flags: ""
          - name: JIT 2
            target: //tests:jit_dev_tests_shard2
            extra_flags: ""
          - name: JIT 3
            target: //tests:jit_dev_tests_shard3
            extra_flags: ""
          - name: JIT-2S 0
            target: //tests:jit_two_state_tests_shard0
            extra_flags: ""
          - name: JIT-2S 1
            target: //tests:jit_two_state_tests_shard1
            extra_flags: ""
          - name: JIT-2S 2
            target: //tests:jit_two_state_tests_shard2
            extra_flags: ""
          - name: JIT-2S 3
            target: //tests:jit_two_state_tests_shard3
            extra_flags: ""
          - name: AOT Smoke
            target: //tests:aot_smoke_tests
            extra_flags: "--test_env=LYRA_CC=/usr/bin/clang"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.16.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ hashFiles('MODULE.bazel') }}
          repository-cache: true

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/lsb-release
          echo "deb http://apt.llvm.org/${DISTRIB_CODENAME}/ llvm-toolchain-${DISTRIB_CODENAME}-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-20 llvm-20
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 100
          sudo update-alternatives --install /usr/bin/lli lli /usr/bin/lli-20 100
          sudo update-alternatives --set clang++ /usr/bin/clang++-20
          sudo update-alternatives --set clang /usr/bin/clang-20
          sudo update-alternatives --set lli /usr/bin/lli-20

      - name: Test
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          RBE_FLAGS=""
          if [[ -n "$BUILDBUDDY_API_KEY" ]]; then
            RBE_FLAGS="--config=rbe --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY"
          fi
          bazel test ${{ matrix.target }} $RBE_FLAGS \
            ${{ matrix.extra_flags }} \
            --test_output=errors --verbose_failures

  aot-full:
    name: AOT Full (shard ${{ matrix.shard }})
    needs: build
    if: ${{ github.event_name == 'push' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.16.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ hashFiles('MODULE.bazel') }}
          repository-cache: true

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/lsb-release
          echo "deb http://apt.llvm.org/${DISTRIB_CODENAME}/ llvm-toolchain-${DISTRIB_CODENAME}-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-20 llvm-20
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 100
          sudo update-alternatives --set clang++ /usr/bin/clang++-20
          sudo update-alternatives --set clang /usr/bin/clang-20

      - name: Test (AOT shard ${{ matrix.shard }})
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          RBE_FLAGS=""
          if [[ -n "$BUILDBUDDY_API_KEY" ]]; then
            RBE_FLAGS="--config=rbe --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY"
          fi
          bazel test //tests:aot_dev_tests_shard${{ matrix.shard }} $RBE_FLAGS \
            --test_env=LYRA_CC=/usr/bin/clang \
            --test_output=errors --verbose_failures

  build-status:
    name: Build Status
    needs: [changes, build, test, aot-full]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.changes.outputs.src }}" != "true" ]]; then
            echo "No source changes detected, skipping build"
            exit 0
          elif [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build failed"
            exit 1
          elif [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Tests failed"
            exit 1
          elif [[ "${{ needs.aot-full.result }}" != "success" && "${{ needs.aot-full.result }}" != "skipped" ]]; then
            echo "AOT full tests failed"
            exit 1
          else
            echo "All checks passed"
            exit 0
          fi
