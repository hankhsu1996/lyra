name: Benchmark

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'include/**'
              - 'tests/**'
              - 'examples/**'
              - 'tools/bench/**'
              - 'BUILD.bazel'
              - 'MODULE.bazel'
              - '.bazelrc'
              - '.github/workflows/benchmark.yml'

  benchmark:
    name: Run Benchmarks
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ hashFiles('MODULE.bazel') }}
          repository-cache: true

      - name: Install LLVM 20
        run: |
          wget -qO /tmp/llvm.key https://apt.llvm.org/llvm-snapshot.gpg.key
          sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/apt.llvm.org.gpg /tmp/llvm.key
          . /etc/lsb-release
          echo "deb http://apt.llvm.org/${DISTRIB_CODENAME}/ llvm-toolchain-${DISTRIB_CODENAME}-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-20 llvm-20
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 100
          sudo update-alternatives --install /usr/bin/lli lli /usr/bin/lli-20 100
          sudo update-alternatives --set clang++ /usr/bin/clang++-20
          sudo update-alternatives --set clang /usr/bin/clang-20
          sudo update-alternatives --set lli /usr/bin/lli-20

      - name: Setup Verilator
        uses: veryl-lang/setup-verilator@v1

      - name: Log tool versions
        run: |
          echo "## Tool Versions" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          verilator --version >> "$GITHUB_STEP_SUMMARY"
          clang++ --version | head -1 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build lyra
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          RBE_FLAGS=""
          if [[ -n "$BUILDBUDDY_API_KEY" ]]; then
            RBE_FLAGS="--config=rbe --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY"
          fi
          bazel build -c opt //:lyra $RBE_FLAGS

      - name: Run benchmarks
        run: |
          set -o pipefail
          python3 tools/bench/run_benchmarks.py --tier=pr --ci | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-crash-artifacts
          path: crash-artifacts/
          if-no-files-found: ignore
