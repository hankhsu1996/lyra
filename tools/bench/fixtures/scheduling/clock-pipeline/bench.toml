[benchmark]
name = "clock-pipeline"
family = "scheduling"
focus = "runtime"
primary = "mixed clock edge / NBA / propagation scheduling workload"
secondary = ["comb kernel overhead", "edge subscription traversal"]
regression_means = "scheduling/clock-edge/NBA/propagation path regressed"

[tiers]
pr = true
nightly = true

[params.defaults]
NUM_CYCLES = 500000

[params.pr]
NUM_CYCLES = 50000

[params.nightly]
NUM_CYCLES = 500000

[counters]
relevant = []
