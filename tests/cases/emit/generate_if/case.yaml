id: emit.generate_if
tags: [emit, generate]
input:
  command: [emit, cpp]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "=== Top.hpp ==="
      - "=== main.cpp ==="
      - "class Top final : public lyra::runtime::Module"
      - "Top() {"
      - "if (1) {"
      - "switch (1) {"
      - "case 0:"
      - "default:"
      - "auto process_0() -> lyra::runtime::Process"
      - "co_return;"
      - "x = 1;"
      - "ctx.AddProcess("
      - "lyra::runtime::ProcessKind::kInitial"
      - "process_0()"
