feature: wait_event
description: Tests for event control and sensitivity lists (LRM 9.4.2)

cases:
  - name: always_comb_runs_once_at_time_zero
    sv: |
      module Test;
        int a, b, c;
        initial begin
          a = 1;
          b = 2;
        end

        always_comb c = a + b;
      endmodule
    expect:
      variables:
        c: 3
      time: 0

  - name: always_comb_reacts_to_input_change
    sv: |
      module Test;
        int a, b, c;
        initial begin
          a = 1;
          b = 2;
          #5 a = 3;
        end

        always_comb c = a + b;
      endmodule
    expect:
      variables:
        c: 5
      time: 5

  - name: wait_until_change
    sv: |
      module Test;
        int a;
        initial begin
          @(a);
        end

        initial #5 a = 1;
      endmodule
    expect:
      variables:
        a: 1
      time: 5

  - name: wait_then_delay
    sv: |
      module Test;
        int a;
        initial begin
          @(a);
          #2;
        end

        initial #5 a = 1;
      endmodule
    expect:
      variables:
        a: 1
      time: 7

  - name: posedge_trigger
    sv: |
      module Test;
        int clk, seen;
        initial begin
          @(posedge clk);
          seen = 1;
        end

        initial begin
          clk = 0;
          #5 clk = 1;
        end
      endmodule
    expect:
      variables:
        seen: 1
      time: 5

  - name: negedge_trigger
    sv: |
      module Test;
        int clk, seen;
        initial begin
          @(negedge clk);
          seen = 1;
        end

        initial begin
          clk = 1;
          #5 clk = 0;
        end
      endmodule
    expect:
      variables:
        seen: 1
      time: 5

  - name: edge_trigger
    sv: |
      module Test;
        int clk, seen;
        initial begin
          @(edge clk);
          seen = 1;
        end

        initial begin
          clk = 0;
          #5 clk = 1;
        end
      endmodule
    expect:
      variables:
        seen: 1
      time: 5

  - name: always_ff_posedge
    sv: |
      module Test;
        int clk, q;
        initial clk = 0;

        always_ff @(posedge clk) q = 42;

        initial begin
          #2 clk = 1;
          #2 clk = 0;
          #2 clk = 1;
        end
      endmodule
    expect:
      variables:
        q: 42
      time: 6

  - name: always_latch_behavior
    sv: |
      module Test;
        int a, b, q;
        always_latch begin
          if (a > 0)
            q = a + b;
        end

        initial begin
          a = 1; b = 2;
          #5 a = 0;
        end
      endmodule
    expect:
      variables:
        q: 3
      time: 5

  - name: correct_posedge_count
    sv: |
      module Test;
        bit a;
        int count;

        always_ff @(posedge a) begin
          count = count + 1;
        end

        initial begin
          a = 0;
          #5 a = 1;
          #5 a = 0;
          #5 a = 1;
          #5 a = 0;
        end
      endmodule
    expect:
      variables:
        count: 2
      time: 20

  - name: any_change_string_trigger
    sv: |
      module Test;
        string s;
        int seen;
        initial begin
          @(s);
          seen = 1;
        end

        initial begin
          s = "abc";
          #3 s = "def";
        end
      endmodule
    expect:
      variables:
        seen: 1
      time: 3

  - name: posedge_or_negedge_trigger_first_edge
    description: |
      Test that @(posedge clk or negedge rst) triggers on posedge clk.
      Regression test for edge kind overwrite bug where wait_set_ key
      didn't include variable, causing last edge kind to overwrite previous.
    sv: |
      module Test;
        bit clk, rst;
        int seen;
        initial begin
          clk = 0;
          rst = 1;
          @(posedge clk or negedge rst);
          seen = 1;
        end

        initial #5 clk = 1;
      endmodule
    expect:
      variables:
        seen: 1
      time: 5

  - name: posedge_or_negedge_trigger_second_edge
    description: |
      Test that @(posedge clk or negedge rst) triggers on negedge rst.
    sv: |
      module Test;
        bit clk, rst;
        int seen;
        initial begin
          clk = 0;
          rst = 1;
          @(posedge clk or negedge rst);
          seen = 1;
        end

        initial #5 rst = 0;
      endmodule
    expect:
      variables:
        seen: 1
      time: 5

  - name: large_sensitivity_list_inline
    description: |
      Test always_comb with 32 inputs (at the inline capacity limit).
      Verifies the inline trigger storage path works correctly.
    sv: |
      module Test;
        int a0, a1, a2, a3, a4, a5, a6, a7;
        int a8, a9, a10, a11, a12, a13, a14, a15;
        int a16, a17, a18, a19, a20, a21, a22, a23;
        int a24, a25, a26, a27, a28, a29, a30, a31;
        int sum;

        always_comb sum = a0 + a1 + a2 + a3 + a4 + a5 + a6 + a7 +
                          a8 + a9 + a10 + a11 + a12 + a13 + a14 + a15 +
                          a16 + a17 + a18 + a19 + a20 + a21 + a22 + a23 +
                          a24 + a25 + a26 + a27 + a28 + a29 + a30 + a31;

        initial begin
          a0 = 1; a1 = 1; a2 = 1; a3 = 1; a4 = 1; a5 = 1; a6 = 1; a7 = 1;
          a8 = 1; a9 = 1; a10 = 1; a11 = 1; a12 = 1; a13 = 1; a14 = 1; a15 = 1;
          a16 = 1; a17 = 1; a18 = 1; a19 = 1; a20 = 1; a21 = 1; a22 = 1; a23 = 1;
          a24 = 1; a25 = 1; a26 = 1; a27 = 1; a28 = 1; a29 = 1; a30 = 1; a31 = 1;
        end
      endmodule
    expect:
      variables:
        sum: 32
      time: 0

  - name: large_sensitivity_list_overflow
    description: |
      Test always_comb with 40 inputs (exceeds inline capacity of 32).
      Verifies the heap-allocated trigger storage path works correctly.
    sv: |
      module Test;
        int a0, a1, a2, a3, a4, a5, a6, a7;
        int a8, a9, a10, a11, a12, a13, a14, a15;
        int a16, a17, a18, a19, a20, a21, a22, a23;
        int a24, a25, a26, a27, a28, a29, a30, a31;
        int a32, a33, a34, a35, a36, a37, a38, a39;
        int sum;

        always_comb sum = a0 + a1 + a2 + a3 + a4 + a5 + a6 + a7 +
                          a8 + a9 + a10 + a11 + a12 + a13 + a14 + a15 +
                          a16 + a17 + a18 + a19 + a20 + a21 + a22 + a23 +
                          a24 + a25 + a26 + a27 + a28 + a29 + a30 + a31 +
                          a32 + a33 + a34 + a35 + a36 + a37 + a38 + a39;

        initial begin
          a0 = 1; a1 = 1; a2 = 1; a3 = 1; a4 = 1; a5 = 1; a6 = 1; a7 = 1;
          a8 = 1; a9 = 1; a10 = 1; a11 = 1; a12 = 1; a13 = 1; a14 = 1; a15 = 1;
          a16 = 1; a17 = 1; a18 = 1; a19 = 1; a20 = 1; a21 = 1; a22 = 1; a23 = 1;
          a24 = 1; a25 = 1; a26 = 1; a27 = 1; a28 = 1; a29 = 1; a30 = 1; a31 = 1;
          a32 = 1; a33 = 1; a34 = 1; a35 = 1; a36 = 1; a37 = 1; a38 = 1; a39 = 1;
        end
      endmodule
    expect:
      variables:
        sum: 40
      time: 0

  - name: anychange_bit0_stable
    description: |
      Regression test: kAnyChange must fire when value changes but bit0 is
      unchanged (e.g. 1 -> 3 both have bit0=1). Verifies that the scheduler
      uses full byte-range comparison, not single-bit observation.
    sv: |
      module Test;
        int a, seen;
        initial begin
          a = 1;
          #1 a = 3;
        end
        always @(a) seen = a;
      endmodule
    expect:
      variables:
        seen: 3
      time: 1

  - name: anychange_bit0_stable_always_comb
    description: |
      Regression test: always_comb must re-evaluate when input changes
      without affecting bit0 (e.g. 2 -> 4, both have bit0=0).
    sv: |
      module Test;
        int a, b;
        initial begin
          a = 2;
          #1 a = 4;
        end
        always_comb b = a + 10;
      endmodule
    expect:
      variables:
        b: 14
      time: 1

  - name: always_ff_rearm_multiple_edges
    description: |
      Regression test for G9 wait-plan refresh rewrite. Verifies that
      always_ff correctly re-arms after each posedge and accumulates
      the right count across multiple clock cycles.
    sv: |
      module Test;
        bit clk;
        int count;

        always_ff @(posedge clk) begin
          count = count + 1;
        end

        initial begin
          clk = 0;
          #2 clk = 1;
          #2 clk = 0;
          #2 clk = 1;
          #2 clk = 0;
          #2 clk = 1;
        end
      endmodule
    expect:
      variables:
        count: 3
      time: 10

  - name: always_event_control_setup_before_wait
    description: |
      Regression test for G9 safety guard. A non-canonical always with
      setup statements before the event control must re-execute the setup
      on every iteration. The G9 rewrite must NOT apply here because the
      entry block contains statements (not a pure wait-arm).
    sv: |
      module Test;
        bit clk;
        int setup_count, body_count;

        always begin
          setup_count = setup_count + 1;
          @(posedge clk);
          body_count = body_count + 1;
        end

        initial begin
          clk = 0;
          #2 clk = 1;
          #2 clk = 0;
          #2 clk = 1;
        end
      endmodule
    expect:
      variables:
        setup_count: 3
        body_count: 2
      time: 6

  - name: always_event_control_static_rearm
    description: |
      Regression test for G9 wait-plan refresh rewrite. A static
      always @(posedge clk) should be rewritten to re-arm the wait
      directly (same shape as always_ff). Verifies correct count.
    sv: |
      module Test;
        bit clk;
        int count;

        always @(posedge clk) begin
          count = count + 1;
        end

        initial begin
          clk = 0;
          #2 clk = 1;
          #2 clk = 0;
          #2 clk = 1;
          #2 clk = 0;
          #2 clk = 1;
        end
      endmodule
    expect:
      variables:
        count: 3
      time: 10

  # Must-def sensitivity exclusion tests (G7d Phase 1).
  # These verify that write-before-read patterns in always_comb do not
  # create false self-trigger edges. Without must-def analysis, these
  # patterns cause infinite re-triggering or incorrect values.

  - name: must_def_simple_write_then_read
    description: >
      Pipeline pattern: write a variable then read it back in the same
      always_comb block. The read of data_comb should not create a
      self-trigger edge because data_comb is always written first.
    sv: |
      module Test;
        int data_in, data_comb, result;
        initial begin
          data_in = 42;
        end

        always_comb begin
          data_comb = data_in ^ (data_in >> 1);
          data_comb = data_comb + data_in;
        end

        always_comb result = data_comb;
      endmodule
    expect:
      variables:
        data_comb: 105
        result: 105
      time: 0

  - name: must_def_sequential_chain
    description: >
      Chain of writes and reads: a = x; b = a; c = b;
      Internal reads of a and b should be excluded from sensitivity.
    sv: |
      module Test;
        int x, a, b, c;
        initial x = 10;

        always_comb begin
          a = x + 1;
          b = a + 2;
          c = b + 3;
        end
      endmodule
    expect:
      variables:
        a: 11
        b: 13
        c: 16
      time: 0

  - name: must_def_if_else_both_define
    description: >
      Both branches of if/else define the variable. The read after the
      if/else should be excluded from sensitivity because the variable
      is must-defined on all paths.
    sv: |
      module Test;
        int sel, x, y, tmp, result;
        initial begin
          sel = 1;
          x = 10;
          y = 20;
        end

        always_comb begin
          if (sel)
            tmp = x;
          else
            tmp = y;
          result = tmp + 1;
        end
      endmodule
    expect:
      variables:
        result: 11
      time: 0

  - name: must_def_if_no_else
    description: >
      If without else: tmp is only written on the then-path. The read
      after the if should remain sensitive to tmp because it might not
      be written on the fallthrough path.
    sv: |
      module Test;
        int sel, x, tmp, result;
        initial begin
          sel = 1;
          x = 10;
          tmp = 5;
        end

        always_comb begin
          if (sel)
            tmp = x;
          result = tmp + 1;
        end
      endmodule
    expect:
      variables:
        result: 11
      time: 0

  - name: must_def_case_full
    description: >
      Case with all branches (including default) defining the variable.
      The read after the case should be excluded from sensitivity.
    sv: |
      module Test;
        int sel, a, b, c, tmp, result;
        initial begin
          sel = 1;
          a = 10;
          b = 20;
          c = 30;
        end

        always_comb begin
          case (sel)
            0: tmp = a;
            1: tmp = b;
            default: tmp = c;
          endcase
          result = tmp + 1;
        end
      endmodule
    expect:
      variables:
        result: 21
      time: 0

  - name: must_def_reacts_to_true_inputs
    description: >
      Verify that the must-def exclusion does not suppress true input
      sensitivity. data_in changes at time 5 and should still trigger
      the always_comb block.
    sv: |
      module Test;
        int data_in, data_comb;
        initial begin
          data_in = 10;
          #5 data_in = 20;
        end

        always_comb begin
          data_comb = data_in + 1;
          data_comb = data_comb * 2;
        end
      endmodule
    expect:
      variables:
        data_comb: 42
      time: 5
