id: errors.unsupported_unpacked_union
tags: [errors, diag]
input:
  command: [emit, cpp]
  project: false
  top: Top
  files: [main.sv]
  args: ["--no-color"]
expect:
  exit: 1
  stderr:
    contains:
      - "main.sv:2:"
      - "unsupported:"
      - "unpacked union types are not yet supported"
      - "union { int a; int b; } u;"
    not_contains:
      - "internal error"
      - "\x1b["
