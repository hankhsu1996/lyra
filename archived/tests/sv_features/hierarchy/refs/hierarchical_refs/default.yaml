feature: hierarchical_refs
description: Test hierarchical path references (read and write through child instances)

cases:
  - name: basic_ref
    description: Write and read a child module signal via hierarchical path
    sv: |
      module Child;
        logic [7:0] value;
      endmodule

      module Top;
        Child u_child();
        logic [7:0] x;

        initial begin
          u_child.value = 42;
          x = u_child.value;
        end
      endmodule
    expect:
      variables:
        x: 42

  - name: expression_write
    description: Write an expression result to a child variable
    sv: |
      module Child;
        int value;
      endmodule

      module Top;
        Child u_child();
        int base;
        int result;

        initial begin
          base = 10;
          u_child.value = base + 5;
          result = u_child.value;
        end
      endmodule
    expect:
      variables:
        result: 15

  - name: multi_level
    description: Read and write through multiple levels of hierarchy
    sv: |
      module Inner;
        int data;
      endmodule

      module Middle;
        Inner u_inner();
      endmodule

      module Top;
        Middle u_mid();
        int x;

        initial begin
          u_mid.u_inner.data = 123;
          x = u_mid.u_inner.data;
        end
      endmodule
    expect:
      variables:
        x: 123

  - name: multiple_children
    description: References to variables in different child instances
    sv: |
      module Child;
        int value;
      endmodule

      module Top;
        Child u_a();
        Child u_b();
        int sum;

        initial begin
          u_a.value = 3;
          u_b.value = 7;
          sum = u_a.value + u_b.value;
        end
      endmodule
    expect:
      variables:
        sum: 10

  - name: display_arg
    description: Hierarchical ref used as $display argument
    sv: |
      module Child;
        int value;
      endmodule

      module Top;
        Child u_child();

        initial begin
          u_child.value = 99;
          $display("value = %d", u_child.value);
        end
      endmodule
    expect:
      stdout:
        contains: ["value = 99"]

  - name: simple_assign_ref
    description: Continuous assign from hierarchical ref (external_read boundary)
    sv: |
      module Child;
        logic [7:0] value;
        initial value = 8'hAB;
      endmodule

      module Top;
        Child u_child();
        logic [7:0] x;

        assign x = u_child.value;

        initial begin
          #1;
          $display("x = %h", x);
        end
      endmodule
    expect:
      stdout:
        contains: ["x = ab"]

  - name: binary_op_ref
    description: Hierarchical ref as binary op operand (external_read + value temp)
    sv: |
      module Child;
        logic [7:0] value;
        initial value = 8'h10;
      endmodule

      module Top;
        Child u_child();
        logic [7:0] x;

        assign x = u_child.value + 8'h01;

        initial begin
          #1;
          $display("x = %h", x);
        end
      endmodule
    expect:
      stdout:
        contains: ["x = 11"]

  - name: call_arg_ref
    description: Hierarchical ref as function argument (external_read materialized before call)
    sv: |
      module Child;
        int value;
        initial value = 10;
      endmodule

      module Top;
        Child u_child();
        int result;

        function automatic int double_it(int v);
          return v * 2;
        endfunction

        assign result = double_it(u_child.value);

        initial begin
          #1;
          $display("result = %0d", result);
        end
      endmodule
    expect:
      stdout:
        contains: ["result = 20"]

  - name: ternary_ref
    description: Hierarchical ref used in ternary expression (external_read per arm, value edge args)
    sv: |
      module Child;
        logic [7:0] value;
        initial value = 8'hAB;
      endmodule

      module Top;
        Child u_child();
        logic sel;
        logic [7:0] result;

        assign result = sel ? u_child.value : 8'h00;

        initial begin
          sel = 1;
          #1;
          $display("result = %h", result);
        end
      endmodule
    expect:
      stdout:
        contains: ["result = ab"]

  - name: ternary_both_refs
    description: Ternary with both branches being hierarchical refs
    sv: |
      module Child;
        logic [7:0] a, b;
        initial begin
          a = 8'hAA;
          b = 8'hBB;
        end
      endmodule

      module Top;
        Child u_child();
        logic sel;
        logic [7:0] result;

        assign result = sel ? u_child.a : u_child.b;

        initial begin
          sel = 0;
          #1;
          $display("result = %h", result);
        end
      endmodule
    expect:
      stdout:
        contains: ["result = bb"]

  - name: if_else_ref
    description: Hierarchical ref in if-else with value merging across blocks
    sv: |
      module Child;
        int x;
        initial x = 42;
      endmodule

      module Top;
        Child u_child();
        int result;
        logic cond;

        always_comb begin
          if (cond)
            result = u_child.x + 1;
          else
            result = u_child.x - 1;
        end

        initial begin
          cond = 1;
          #1;
          $display("result = %0d", result);
        end
      endmodule
    expect:
      stdout:
        contains: ["result = 43"]

  - name: parameter_ref
    description: Read a child module parameter via hierarchical path
    sv: |
      module Child #(parameter int WIDTH = 8);
        logic [WIDTH-1:0] value;
      endmodule

      module Top;
        Child #(.WIDTH(16)) u_child();
        int w;

        initial begin
          w = u_child.WIDTH;
        end
      endmodule
    expect:
      variables:
        w: 16

  - name: reactive_cross_object_write
    description: |
      Cross-object hierarchical-ref write performed from inside an
      always_comb body. Proves phase-2 fixpoint discovery picks up the
      target instance dirtied by the write, so the child's own
      always_comb re-fires on the child slot's change.
    sv: |
      module Child;
        int a;
        int mirror;
        always_comb mirror = a;
      endmodule

      module Top;
        int x;
        int final_mirror;
        Child c();

        always_comb c.a = x;

        initial begin
          x = 42;
          #1;
          x = 99;
          #1;
          final_mirror = c.mirror;
        end
      endmodule
    expect:
      variables:
        final_mirror: 99
