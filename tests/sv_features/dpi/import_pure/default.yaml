feature: dpi_import_pure
description: DPI-C pure import function declaration acceptance and rejection

cases:
  - name: accept_dpi_non_pure
    sv: |
      module Test;
        import "DPI-C" function int non_pure_fn(int x);
        initial begin end
      endmodule

  - name: accept_dpi_output_param
    sv: |
      module Test;
        import "DPI-C" function void out_fn(output int x);
        initial begin end
      endmodule

  - name: accept_dpi_inout_param
    sv: |
      module Test;
        import "DPI-C" function void inout_fn(inout int x);
        initial begin end
      endmodule

  - name: accept_dpi_chandle_param
    sv: |
      module Test;
        import "DPI-C" function void ch_fn(chandle h);
        initial begin end
      endmodule

  - name: accept_dpi_chandle_return
    sv: |
      module Test;
        import "DPI-C" function chandle ch_ret();
        initial begin end
      endmodule

  - name: accept_dpi_packed_vector
    sv: |
      module Test;
        import "DPI-C" function void packed_fn(input bit [31:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_packed_vector_64
    sv: |
      module Test;
        import "DPI-C" function void packed64_fn(input bit [63:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_packed_struct
    sv: |
      module Test;
        typedef struct packed { bit [15:0] a; bit [15:0] b; } packed32_t;
        import "DPI-C" function void ps_fn(input packed32_t v);
        initial begin end
      endmodule

  - name: accept_dpi_packed_union
    sv: |
      module Test;
        typedef union packed { bit [31:0] a; bit [31:0] b; } punion_t;
        import "DPI-C" function void pu_fn(input punion_t v);
        initial begin end
      endmodule

  - name: accept_dpi_logic_arg
    sv: |
      module Test;
        import "DPI-C" pure function int logic_arg_fn(logic x);
        initial begin end
      endmodule

  - name: accept_dpi_logic_return
    sv: |
      module Test;
        import "DPI-C" pure function logic logic_fn();
        initial begin end
      endmodule

  - name: accept_dpi_integer_return_declaration
    sv: |
      module Test;
        import "DPI-C" pure function integer int_fn();
        initial begin end
      endmodule
    expect:
      variables: {}

  - name: accept_dpi_packed_4state
    sv: |
      module Test;
        import "DPI-C" pure function int logic_vec_fn(input logic [7:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_logic_vec_32
    sv: |
      module Test;
        import "DPI-C" function void lv32_fn(input logic [31:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_logic_vec_64
    sv: |
      module Test;
        import "DPI-C" function void lv64_fn(input logic [63:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_logic_output
    sv: |
      module Test;
        import "DPI-C" function void logic_out_fn(output logic x);
        initial begin end
      endmodule

  - name: accept_dpi_logic_inout
    sv: |
      module Test;
        import "DPI-C" function void logic_inout_fn(inout logic x);
        initial begin end
      endmodule

  - name: accept_dpi_logic_vec_output
    sv: |
      module Test;
        import "DPI-C" function void lv_out_fn(output logic [31:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_logic_vec_wide_input
    sv: |
      module Test;
        import "DPI-C" function void wide_fn(input logic [127:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_logic_vec_wide_output
    sv: |
      module Test;
        import "DPI-C" function void wide_fn(output logic [127:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_logic_vec_wide_inout
    sv: |
      module Test;
        import "DPI-C" function void wide_fn(inout logic [127:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_bit_vec_wide_input
    sv: |
      module Test;
        import "DPI-C" function void wide_fn(input bit [127:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_bit_vec_wide_output
    sv: |
      module Test;
        import "DPI-C" function void wide_fn(output bit [127:0] v);
        initial begin end
      endmodule

  - name: accept_dpi_bit_vec_wide_inout
    sv: |
      module Test;
        import "DPI-C" function void wide_fn(inout bit [127:0] v);
        initial begin end
      endmodule


  # The frontend rejects packed vector DPI return types at parse time before
  # Lyra DPI lowering sees them. Lyra's own kLogicVecNarrow return rejection
  # Explicit packed-array return types are rejected by slang, not Lyra.
  # Only predefined 4-state types like 'integer' pass through slang.
  - name: reject_dpi_logic_vec_return_frontend_before_lyra
    sv: |
      module Test;
        import "DPI-C" function logic [7:0] lvr_fn();
        initial begin end
      endmodule
    expect:
      error:
        contains:
          - "not a valid return type for a DPI subroutine"

  - name: accept_dpi_string_return
    sv: |
      module Test;
        import "DPI-C" pure function string str_fn();
        initial begin end
      endmodule

  - name: accept_dpi_string_param
    sv: |
      module Test;
        import "DPI-C" pure function int str_param_fn(string s);
        initial begin end
      endmodule

  - name: accept_dpi_string_param_and_return
    sv: |
      module Test;
        import "DPI-C" pure function string echo(string s);
        initial begin end
      endmodule

  - name: accept_dpi_string_c_identifier
    sv: |
      module Test;
        import "DPI-C" pure c_greet = function string greeting();
        initial begin end
      endmodule

  - name: reject_dpi_realtime_return
    sv: |
      module Test;
        import "DPI-C" pure function realtime rt_fn();
        initial begin end
      endmodule
    expect:
      error:
        contains:
          - "DPI-C return type"
          - "not yet supported"

  - name: reject_dpi_import_task
    sv: |
      module Test;
        import "DPI-C" task dpi_task();
        initial begin end
      endmodule
    expect:
      error:
        contains:
          - "DPI-C import tasks not yet supported"

  - name: reject_dpi_package_task
    sv: |
      package dpi_pkg;
        import "DPI-C" task pkg_task();
      endpackage
      module Test;
        initial begin end
      endmodule
    expect:
      error:
        contains:
          - "DPI-C import tasks not yet supported"
