feature: dpi_export_general
description: DPI-C export end-to-end integration tests

cases:
  - name: module_export_single_body_scope_binding
    dpi_sources:
      - dpi_helpers/module_export_scope_binding.c
    sv: |
      module Inner #(parameter int ID = 0) ();
        export "DPI-C" function get_id;
        function automatic int get_id();
          return ID;
        endfunction
      endmodule

      module Test;
        Inner #(11) a();
        Inner #(22) b();
        import "DPI-C" function int call_module_exports();
        int result;
        initial begin
          result = call_module_exports();
        end
      endmodule
    expect:
      variables:
        result: 1

  - name: module_export_multiple_exports_same_body
    dpi_sources:
      - dpi_helpers/module_export_multi.c
    sv: |
      module Inner #(parameter int ID = 0) ();
        export "DPI-C" function get_id;
        export "DPI-C" function get_id_plus_one;
        function automatic int get_id();
          return ID;
        endfunction
        function automatic int get_id_plus_one();
          return ID + 1;
        endfunction
      endmodule

      module Test;
        Inner #(11) a();
        Inner #(22) b();
        import "DPI-C" function int call_both_exports();
        int result;
        initial begin
          result = call_both_exports();
        end
      endmodule
    expect:
      variables:
        result: 1

  - name: module_export_instance_local_state
    dpi_sources:
      - dpi_helpers/module_export_local_state.c
    sv: |
      module Inner ();
        int x;
        export "DPI-C" function get_x;
        function automatic int get_x();
          return x;
        endfunction
      endmodule

      module Test;
        Inner a();
        Inner b();
        import "DPI-C" function int call_same_body_instances();
        int result;
        initial begin
          a.x = 101;
          b.x = 202;
          result = call_same_body_instances();
        end
      endmodule
    expect:
      variables:
        result: 1

  - name: module_export_header_shape
    dump_dpi_header: true
    sv: |
      module Test;
        export "DPI-C" function mod_fn;
        function int mod_fn(int x);
          return x;
        endfunction
        initial begin end
      endmodule
    expect:
      compiler_output:
        contains:
          - "int mod_fn(int);"
        not_contains:
          - "svScope"

  - name: module_export_null_scope_fatal
    dpi_sources:
      - dpi_helpers/module_export_no_scope.c
    sv: |
      module Inner #(parameter int ID = 0) ();
        export "DPI-C" function get_id;
        function automatic int get_id();
          return ID;
        endfunction
      endmodule

      module Test;
        Inner #(11) a();
        import "DPI-C" function int call_without_scope();
        int result;
        initial begin
          result = call_without_scope();
        end
      endmodule
    expect:
      runtime_fatal:
        stderr_contains:
          - "module-scoped DPI export function called without active instance scope"

  - name: export_scalar_return_roundtrip
    sv: |
      package dpi_pkg;
        function int get_forty_two();
          return 42;
        endfunction
        export "DPI-C" function get_forty_two;

        function int add_two(int a, int b);
          return a + b;
        endfunction
        export "DPI-C" function add_two;
      endpackage

      module Test;
        import "DPI-C" function int call_get_forty_two();
        import "DPI-C" function int call_add_two(int a, int b);
        import dpi_pkg::*;

        int r1;
        int r2;

        initial begin
          r1 = call_get_forty_two();
          r2 = call_add_two(17, 25);
          $display("r1=%0d r2=%0d", r1, r2);
        end
      endmodule
    dpi_sources:
      - dpi_helpers/export_caller.c
    expect:
      variables:
        r1: 42
        r2: 42

  - name: export_in_generate_if
    description: DPI export inside a single-branch generate-if
    sv: |
      module Inner #(parameter bit USE_FAST = 1) ();
        if (USE_FAST) begin : gen_fast
          export "DPI-C" function get_mode;
          function automatic int get_mode();
            return 1;
          endfunction
        end
      endmodule

      module Test;
        Inner #(1) u();
        initial begin end
      endmodule
    expect:
      stdout: ""

  - name: export_in_generate_else
    description: DPI export inside the else branch of a generate-if
    sv: |
      module Inner #(parameter bit USE_ICACHE = 0) ();
        if (USE_ICACHE) begin : gen_icache
          function automatic int get_scramble_key();
            return 1;
          endfunction
        end else begin : gen_prefetch
          export "DPI-C" function get_scramble_key;
          function automatic int get_scramble_key();
            return 0;
          endfunction
        end
      endmodule

      module Test;
        Inner #(0) u();
        initial begin end
      endmodule
    expect:
      stdout: ""

  - name: export_in_nested_generate
    description: DPI export inside two levels of generate-if
    sv: |
      module Inner #(parameter bit P = 1, bit Q = 1) ();
        if (P) begin : g1
          if (Q) begin : g2
            export "DPI-C" function get_val;
            function automatic int get_val();
              return 42;
            endfunction
          end
        end
      endmodule

      module Test;
        Inner #(1, 1) u();
        initial begin end
      endmodule
    expect:
      stdout: ""

  - name: export_in_generate_for
    description: DPI export inside a loop generate (GenerateBlockArray)
    sv: |
      module Inner ();
        for (genvar i = 0; i < 1; i++) begin : g
          export "DPI-C" function get_idx;
          function automatic int get_idx();
            return i;
          endfunction
        end
      endmodule

      module Test;
        Inner u();
        initial begin end
      endmodule
    expect:
      stdout: ""
