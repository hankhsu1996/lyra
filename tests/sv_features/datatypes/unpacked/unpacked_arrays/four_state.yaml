feature: unpacked_arrays_four_state
description: |
  4-state-specific dynamic indexing tests for unpacked arrays. These tests
  require X/Z semantics and are excluded from 2-state test suites.

cases:
  - name: oob_above_upper_bound
    description: |
      Index above the valid range returns the 4-state default (X).
      Validates that the bounds check rejects out-of-range indices.
    sv: |
      module Test;
        logic [31:0] arr [4];
        logic [31:0] result;
        initial begin
          int idx;
          arr[0] = 32'hAAAA;
          idx = 10;
          result = arr[idx];
        end
      endmodule
    expect:
      variables:
        result: "32'hxxxxxxxx"

  - name: oob_negative_signed_index
    description: |
      Negative signed index returns 4-state default (X). Sign-extended
      negative values must be correctly rejected by signed comparison.
    sv: |
      module Test;
        logic [31:0] arr [8];
        logic [31:0] result;
        initial begin
          int idx;
          arr[0] = 32'hBBBB;
          idx = -1;
          result = arr[idx];
        end
      endmodule
    expect:
      variables:
        result: "32'hxxxxxxxx"

  - name: xz_index_returns_default
    description: |
      4-state index with X/Z bits returns the default value. An unknown
      index cannot select a valid element.
    sv: |
      module Test;
        logic [31:0] arr [4];
        logic [31:0] result;
        initial begin
          logic [7:0] idx;
          idx = 8'hxx;
          arr[0] = 32'hCCCC;
          result = arr[idx];
        end
      endmodule
    expect:
      variables:
        result: "32'hxxxxxxxx"
