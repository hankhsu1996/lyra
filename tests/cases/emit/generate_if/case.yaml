id: emit.generate_if
tags: [emit, generate]
input:
  command: [emit, cpp]
  project: false
  top: Top
  files: [main.sv]
expect:
  exit: 0
  stdout:
    contains:
      - "=== Top.hpp ==="
      - "=== main.cpp ==="
      - "class Top final : public lyra::runtime::Module"
      - "class gen0_then"
      - "class gen1_case0"
      - "class gen1_case1"
      - "class gen1_default"
      - "std::unique_ptr<gen0_then> gen0_then_obj;"
      - "std::unique_ptr<gen1_case0> gen1_case0_obj;"
      - "std::unique_ptr<gen1_default> gen1_default_obj;"
      - "Top() {"
      - "if (1) {"
      - "gen0_then_obj = std::make_unique<gen0_then>();"
      - "switch (1) {"
      - "case 0:"
      - "gen1_case0_obj = std::make_unique<gen1_case0>();"
      - "default:"
      - "gen1_default_obj = std::make_unique<gen1_default>();"
      - "void Bind(lyra::runtime::RuntimeBindContext& ctx) override"
      - "ctx.CreateChildScope("
      - '"gen0_then"'
      - "lyra::runtime::RuntimeScopeKind::kGenerate"
      - "if (gen0_then_obj) {"
      - "gen0_then_obj->Bind(child)"
      - "auto process_0() -> lyra::runtime::Process"
      - "co_return;"
      - "(x = 1);"
      - "ctx.AddProcess("
      - "lyra::runtime::ProcessKind::kInitial"
      - "process_0()"
